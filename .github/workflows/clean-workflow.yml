name: Cleanup Workflow Runs
on:
  schedule:
    - cron: '0 16 * * 6'
  workflow_dispatch:
    inputs:
      keep_days:
        description: "保留最近多少天（0=清理全部，默认0）"
        required: false
        default: "0"
      repositories:
        description: "目标仓库（owner/repo，逗号分隔，留空=当前仓库，all=所有仓库）"
        required: false
        default: "all"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 获取目标仓库列表
        id: set-repos
        env:
          GH_TOKEN: ${{ secrets.AUTH_PAT }}
        run: |
          # PAT 校验
          [ -z "$GH_TOKEN" ] && echo "❌ AUTH_PAT 未配置，请检查 Secrets 设置" && exit 1

          INPUT="${{ github.event.inputs.repositories }}"
          MODE="current"
          REPOS="${{ github.repository }}"

          if [ "$INPUT" = "all" ]; then
            MODE="all"
            echo "🔍 获取所有有权限的仓库..."
            REPOS=$(
              page=1
              while true; do
                BODY=$(curl -sf -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/user/repos?per_page=100&page=$page&affiliation=owner,collaborator") || break
                ITEMS=$(echo "$BODY" | jq -r '.[].full_name')
                [ -z "$ITEMS" ] && break
                echo "$ITEMS"
                page=$((page + 1))
                [ $page -gt 20 ] && break
                sleep 0.5
              done | paste -sd ','
            )
            COUNT=$(echo "$REPOS" | tr ',' '\n' | grep -c .)
            echo "✅ 共找到 $COUNT 个仓库"
          elif [ -n "$INPUT" ]; then
            MODE="manual"
            REPOS=$(echo "$INPUT" | tr -d ' ' | tr -s ',')
          fi

          echo "repositories=$REPOS" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: 执行清理
        id: cleanup-run
        env:
          KEEP_DAYS: ${{ github.event.inputs.keep_days || '0' }}
          REPOSITORIES: ${{ steps.set-repos.outputs.repositories }}
          GH_TOKEN: ${{ secrets.AUTH_PAT }}
        run: |
          # ── 工具函数 ─────────────────────────────────────────────
          # 带重试的 curl（最多3次，指数退避）
          curl_retry() {
            local n=0
            until [ $n -ge 3 ]; do
              OUTPUT=$(curl -s -w "\n%{http_code}" "$@") && \
              HTTP_CODE=$(echo "$OUTPUT" | tail -n1) && \
              BODY=$(echo "$OUTPUT" | sed '$d') && \
              [ "$HTTP_CODE" != "429" ] && [ "$HTTP_CODE" != "500" ] && \
              [ "$HTTP_CODE" != "502" ] && [ "$HTTP_CODE" != "503" ] && return 0
              n=$((n + 1))
              echo "⚠️ 请求失败($HTTP_CODE)，${n}s 后重试..."
              sleep $n
            done
            return 1
          }

          # ── 初始化 ───────────────────────────────────────────────
          KEEP_DAYS=${KEEP_DAYS:-0}
          THRESHOLD="（无）"
          TIME_FILTER=""

          if [ "$KEEP_DAYS" -gt 0 ]; then
            THRESHOLD=$(date -u -d "${KEEP_DAYS} days ago" '+%Y-%m-%dT%H:%M:%SZ')
            TIME_FILTER="&created=%3C${THRESHOLD}"
            echo "📅 保留最近 $KEEP_DAYS 天，阈值: $THRESHOLD"
          else
            echo "⚠️ 将清理所有已完成的工作流运行"
          fi

          IFS=',' read -ra REPO_ARRAY <<< "$REPOSITORIES"
          TOTAL_REPOS=${#REPO_ARRAY[@]}
          DELETED_GLOBAL=0
          FAILED_GLOBAL=0
          SKIPPED_GLOBAL=0
          PROCESSED=0

          # ── 遍历仓库 ─────────────────────────────────────────────
          for TARGET_REPO in "${REPO_ARRAY[@]}"; do
            PROCESSED=$((PROCESSED + 1))
            echo ""
            echo "━━━ ($PROCESSED/$TOTAL_REPOS) $TARGET_REPO ━━━"

            DELETED=0
            FAILED=0
            SKIPPED=0
            page=1

            while true; do
              if ! curl_retry -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$TARGET_REPO/actions/runs?per_page=100&page=$page&status=completed${TIME_FILTER}"; then
                echo "❌ 无法访问仓库，已跳过"
                SKIPPED=1
                SKIPPED_GLOBAL=$((SKIPPED_GLOBAL + 1))
                break
              fi

              case "$HTTP_CODE" in
                404) echo "❌ 仓库不存在或无权访问"; SKIPPED=1; SKIPPED_GLOBAL=$((SKIPPED_GLOBAL + 1)); break ;;
                403) echo "❌ 权限不足"; SKIPPED=1; SKIPPED_GLOBAL=$((SKIPPED_GLOBAL + 1)); break ;;
                200) ;;
                *)   echo "❌ API 错误 ($HTTP_CODE)"; SKIPPED=1; SKIPPED_GLOBAL=$((SKIPPED_GLOBAL + 1)); break ;;
              esac

              RUN_IDS=$(echo "$BODY" | jq -r '.workflow_runs[].id' 2>/dev/null)
              [ -z "$RUN_IDS" ] && echo "✅ 无更多记录" && break

              COUNT=$(echo "$RUN_IDS" | wc -l)
              echo "🗑️ 第 $page 页：$COUNT 条待删除"
              BATCH=0

              while IFS= read -r RUN_ID; do
                echo -n "."
                DEL_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                  -H "Authorization: token $GH_TOKEN" \
                  "https://api.github.com/repos/$TARGET_REPO/actions/runs/$RUN_ID")

                if [ "$DEL_CODE" = "204" ]; then
                  DELETED=$((DELETED + 1))
                  DELETED_GLOBAL=$((DELETED_GLOBAL + 1))
                else
                  FAILED=$((FAILED + 1))
                  FAILED_GLOBAL=$((FAILED_GLOBAL + 1))
                fi

                BATCH=$((BATCH + 1))
                if [ $((BATCH % 10)) -eq 0 ]; then sleep 1; else sleep 0.3; fi
              done <<< "$RUN_IDS"

              echo ""
              ITEM_COUNT=$(echo "$BODY" | jq -r '.workflow_runs | length')
              [ "$ITEM_COUNT" -lt 100 ] && break
              page=$((page + 1))
              sleep 0.3
            done

            if [ "$SKIPPED" -eq 0 ]; then
              echo "✅ 完成：删除 $DELETED 条，失败 $FAILED 条"
            fi
          done

          # ── 输出汇总 ─────────────────────────────────────────────
          echo ""
          echo "══════════════════════════════"
          echo "📋 汇总"
          echo "  处理仓库: $PROCESSED"
          echo "  成功清理: $((PROCESSED - SKIPPED_GLOBAL))"
          echo "  跳过:     $SKIPPED_GLOBAL"
          echo "  删除记录: $DELETED_GLOBAL"
          echo "  删除失败: $FAILED_GLOBAL"
          echo "══════════════════════════════"

          {
            echo "processed=$PROCESSED"
            echo "deleted=$DELETED_GLOBAL"
            echo "skipped=$SKIPPED_GLOBAL"
            echo "failed=$FAILED_GLOBAL"
            echo "threshold=$THRESHOLD"
          } >> $GITHUB_OUTPUT

      - name: 生成摘要报告
        if: always()
        env:
          MODE:      ${{ steps.set-repos.outputs.mode }}
          PROCESSED: ${{ steps.cleanup-run.outputs.processed || 0 }}
          DELETED:   ${{ steps.cleanup-run.outputs.deleted || 0 }}
          SKIPPED:   ${{ steps.cleanup-run.outputs.skipped || 0 }}
          FAILED:    ${{ steps.cleanup-run.outputs.failed || 0 }}
          KEEP_DAYS: ${{ github.event.inputs.keep_days || 0 }}
          THRESHOLD: ${{ steps.cleanup-run.outputs.threshold || '（无）' }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="❌"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧹 工作流清理报告

          | 项目 | 值 |
          |------|----|
          | 状态 | $ICON $STATUS |
          | 执行时间 | $(date '+%Y-%m-%d %H:%M:%S UTC') |
          | 触发方式 | ${{ github.event_name }} |
          | 清理模式 | $MODE |
          | 保留天数 | $KEEP_DAYS 天 |
          | 时间阈值 | $THRESHOLD |

          ## 📊 统计

          | 项目 | 数量 |
          |------|------|
          | 处理仓库数 | $PROCESSED |
          | 成功清理 | $((PROCESSED - SKIPPED)) |
          | 跳过仓库 | $SKIPPED |
          | 删除记录数 | $DELETED |
          | 删除失败 | $FAILED |

          > 下次自动运行：**北京时间每周日 00:00**
          EOF

# ══════════════════════════════════════════════
# 配置说明
# ══════════════════════════════════════════════
# 1. 创建 PAT：Settings → Developer settings → Personal access tokens
#    权限：repo + workflow
#
# 2. 添加 Secret：仓库 → Settings → Secrets → Actions → AUTH_PAT
#
# 3. 手动触发参数：
#    keep_days   : 0=清理全部，7=保留7天内
#    repositories: 留空=当前仓库，all=所有仓库，或指定 owner/repo
# ══════════════════════════════════════════════
