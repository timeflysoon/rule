name: Build ImmortalWrt Multi-Target TurboACC Packages

# 设计定位说明：这不是"全平台"构建脚本，而是"按厂商分类、每个 subtarget
# 选一个代表设备"的构建脚本。同一 subtarget 下所有设备共享内核/kmod ABI，
# 一个代表设备编出来的 turboacc 相关包对该 subtarget 下所有型号都是通用的。
#
# 外部依赖风险提示：turboacc 注入脚本(add_turboacc.sh)对内核版本是白名单判断，
# 目前只接受 6.6 / 6.12 / 6.18。如果 ImmortalWrt 未来某个分支切到其他内核
# 主线/小版本而上游脚本没更新，"Inject turboacc" 这一步会直接报
# "Unsupported kernel version" 并失败，这不是本 workflow 的问题，是上游依赖风险。
#
# 包命名格式提示：ImmortalWrt 较新分支(如 openwrt-25.12)默认使用 apk 包管理器，
# 产物命名格式为 "包名-版本.apk"(连字符)，而不是传统 ipk 的
# "包名_版本_架构.ipk"(下划线)。下游查找/打包逻辑必须同时兼容两种命名，
# 否则会出现包实际已生成、但因为 glob 用下划线匹配不到连字符命名而被
# 误判为"缺失"的情况。
#
# .config 设计原则（重要，踩过四次坑，这是第四次也是最终修正）：
#
# 第一次教训：手写 CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE 这类符号，
# 当时判断这是凭印象编出来的，删掉了。
#
# 第二次教训：改成完全不写任何子选项，让 upstream Kconfig 默认值自己
# 生效，结果实测 KMOD_COUNT=0，一个加速内核模块都没编出来。
#
# 第三次教训：改成从另一个基于 coolsnowwolf/lede 版本的第三方项目
# (ophub/amlogic-s9xxx-openwrt#232)抄了 CONFIG_PACKAGE_luci-app-turboacc_
# INCLUDE_OFFLOADING 这个符号名，结果 CI 仍然报错，"Discover" 步骤打印出
# 的 Makefile 原文显示这个符号压根不存在：
#
#   实测抓到的 PKG_CONFIG_DEPENDS 原文（package/turboacc/luci-app-turboacc/
#   Makefile，PKG_MAINTAINER 是 ImmortalWrt 官方维护者 cnsztl@immortalwrt.org）：
#
#     CONFIG_PACKAGE_TURBOACC_INCLUDE_NO_FASTPATH      (不加速)
#     CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING  (Flow offloading)
#     CONFIG_PACKAGE_TURBOACC_INCLUDE_FAST_CLASSIFIER
#     CONFIG_PACKAGE_TURBOACC_INCLUDE_SHORTCUT_FE_CM
#     CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA
#     CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE
#
#   真实前缀是字面量 TURBOACC，不是 $(PKG_NAME)/luci-app-turboacc；
#   第三次教训里"INCLUDE_OFFLOADING"这个名字本身就不存在，正确名字是
#   "INCLUDE_FLOW_OFFLOADING"。前四项(NO_FASTPATH/FLOW_OFFLOADING/
#   FAST_CLASSIFIER/SHORTCUT_FE_CM)是互斥的快速转发引擎选择(对应截图
#   下拉框四个选项，只能选一个)，BBR_CCA 和 FULLCONE 是独立开关。
#
#   同一份 Makefile 的 LUCI_DEPENDS 也证实了这个前缀：
#     +PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING&&PACKAGE_firewall:kmod-ipt-offload
#     +PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING&&PACKAGE_firewall4:kmod-nft-offload
#     +PACKAGE_TURBOACC_INCLUDE_FAST_CLASSIFIER:kmod-fast-classifier
#     +PACKAGE_TURBOACC_INCLUDE_SHORTCUT_FE_CM:kmod-shortcut-fe-cm
#     +PACKAGE_TURBOACC_INCLUDE_BBR_CCA:kmod-tcp-bbr
#     +PACKAGE_TURBOACC_INCLUDE_FULLCONE&&PACKAGE_firewall:iptables-mod-fullconenat
#     +PACKAGE_TURBOACC_INCLUDE_FULLCONE&&PACKAGE_firewall4:kmod-nft-fullcone
#
# 第四次教训 + 最终定论：Config.in 文件不存在是正常的——这个包用
# LUCI_DEPENDS 的 "+FOO&&BAR:baz" 写法声明条件依赖(FOO=选中的 INCLUDE
# 开关，BAR=当前装的是 firewall(fw3/iptables) 还是 firewall4(fw4/nftables))，
# Kconfig 子菜单项是构建系统根据 PKG_CONFIG_DEPENDS 自动生成的，不需要手写
# Config.in。因此"从 Config.in 动态探测 FULLCONE 符号"这条路本来就注定
# 拿不到任何结果(Config.in 根本不存在)，不是运行时偶发失败，而是必然
# 失败——之前用动态探测只是在制造一个总是命中 else 分支的假安全网。
# 三个符号(FLOW_OFFLOADING / BBR_CCA / FULLCONE)现在统一用同一种方式
# 处理：既然前缀和名字都已经从这次真实源码树的 Makefile 原文里读出来了，
# 就不再区分"哪个能动态探测、哪个不能"，全部显式硬编码写死。
# ImmortalWrt 25.12 默认是 fw4，所以 FLOW_OFFLOADING 会自动拉
# kmod-nft-offload、FULLCONE 会自动拉 kmod-nft-fullcone，不需要额外指定
# firewall 版本。
#
# 结论：这三个符号已经是从这次真实源码树里读出来的原文，不是猜的，可以
# 放心显式写死，不再需要运行时动态探测 Config.in（该文件本就不存在）。

on:
  workflow_dispatch:
    inputs:
      repo_branch:
        description: '要编译的 ImmortalWrt 分支'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - openwrt-24.10
      build_scope:
        description: '编译范围 (按厂商分类, all = 全部代表机型)'
        required: true
        default: 'x86'
        type: choice
        options:
          - all
          - x86
          - arm
          - rockchip
          - mediatek
          - qualcomm
          - broadcom

permissions:
  contents: read

concurrency:
  group: build-immortalwrt-${{ github.event.inputs.repo_branch }}-${{ github.event.inputs.build_scope }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.repo_branch }}
  TURBOACC_SCRIPT: https://raw.githubusercontent.com/mufeng05/turboacc/main/add_turboacc.sh

jobs:
  # ------------------------------------------------------------------
  # 第一步：根据 build_scope(厂商分类) 生成本次实际要跑的矩阵(JSON)
  # 注意：颗粒度是"每个 subtarget 一个代表设备"，不是"每个具体型号"。
  # ------------------------------------------------------------------
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          set -euxo pipefail

          cat > full_matrix.json <<'EOF'
          [
            {
              "name": "x86_64",
              "label": "x86_64 (PC/UEFI/VM)",
              "vendor": "x86",
              "target": "x86",
              "subtarget": "64",
              "device": "generic"
            },
            {
              "name": "armsr_armv8",
              "label": "ARM64 通用 (UEFI/VM/SBC)",
              "vendor": "arm",
              "target": "armsr",
              "subtarget": "armv8",
              "device": "generic"
            },
            {
              "name": "armsr_armv7",
              "label": "ARM32 通用 (UEFI/VM/SBC)",
              "vendor": "arm",
              "target": "armsr",
              "subtarget": "armv7",
              "device": "generic"
            },
            {
              "name": "rockchip_nanopi_r2s",
              "label": "FriendlyARM NanoPi R2S (RK3328, 代表 rockchip/armv8 全系)",
              "vendor": "rockchip",
              "target": "rockchip",
              "subtarget": "armv8",
              "device": "friendlyarm_nanopi-r2s"
            },
            {
              "name": "mediatek_filogic_redmi_ax6000",
              "label": "红米 AX6000 (联发科 MT7986/Filogic)",
              "vendor": "mediatek",
              "target": "mediatek",
              "subtarget": "filogic",
              "device": "xiaomi_redmi-router-ax6000"
            },
            {
              "name": "mediatek_mt7622_linksys_e8450",
              "label": "Linksys E8450 (联发科 MT7622)",
              "vendor": "mediatek",
              "target": "mediatek",
              "subtarget": "mt7622",
              "device": "linksys_e8450-ubi"
            },
            {
              "name": "ramips_mt7621_xiaomi_4a",
              "label": "小米路由器 4A 千兆版 (联发科 MT7621, target 历史上归在 ramips)",
              "vendor": "mediatek",
              "target": "ramips",
              "subtarget": "mt7621",
              "device": "xiaomi_mi-router-4a-gigabit"
            },
            {
              "name": "ipq806x_netgear_r7800",
              "label": "Netgear R7800 (高通 IPQ8065)",
              "vendor": "qualcomm",
              "target": "ipq806x",
              "subtarget": "generic",
              "device": "netgear_r7800"
            },
            {
              "name": "ipq40xx_linksys_ea8300",
              "label": "Linksys EA8300 (高通 IPQ4019)",
              "vendor": "qualcomm",
              "target": "ipq40xx",
              "subtarget": "generic",
              "device": "linksys_ea8300"
            },
            {
              "name": "qualcommax_ipq807x_dl_wrx36",
              "label": "Dynalink DL-WRX36 (高通 IPQ807x, WiFi6E)",
              "vendor": "qualcomm",
              "target": "qualcommax",
              "subtarget": "ipq807x",
              "device": "dynalink_dl-wrx36"
            },
            {
              "name": "bcm27xx_rpi4",
              "label": "树莓派 4 (博通 BCM2711)",
              "vendor": "broadcom",
              "target": "bcm27xx",
              "subtarget": "bcm2711",
              "device": "rpi-4"
            },
            {
              "name": "bcm4908_asus_gt_ac5300",
              "label": "ASUS GT-AC5300 (博通 BCM4908, 设备名待核实, 见 Verify device selection 步骤)",
              "vendor": "broadcom",
              "target": "bcm4908",
              "subtarget": "generic",
              "device": "asus_gt-ac5300"
            },
            {
              "name": "bcm53xx_netgear_r8000",
              "label": "Netgear R8000 (博通 BCM4709, 设备名待核实, 见 Verify device selection 步骤)",
              "vendor": "broadcom",
              "target": "bcm53xx",
              "subtarget": "generic",
              "device": "netgear_r8000"
            }
          ]
          EOF

          SCOPE="${{ github.event.inputs.build_scope }}"
          if [ "$SCOPE" = "all" ]; then
            MATRIX=$(jq -c '{include: .}' full_matrix.json)
          else
            MATRIX=$(jq -c --arg v "$SCOPE" '{include: [ .[] | select(.vendor == $v) ]}' full_matrix.json)
          fi

          COUNT=$(echo "$MATRIX" | jq '.include | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::build_scope='$SCOPE' 没有匹配到任何矩阵条目，请检查 full_matrix.json 里的 vendor 字段"
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "本次将编译 $COUNT 个平台："
          echo "$MATRIX" | jq -r '.include[] | "  - \(.label) [\(.target)/\(.subtarget)/\(.device)]"'

  # ------------------------------------------------------------------
  # 第二步：矩阵内每个平台各跑一个独立 job，互不影响
  # ------------------------------------------------------------------
  build:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      # all 模式下矩阵有 13 个条目，全部并发对 runner 排队/源码镜像访问压力/
      # 缓存命中率都不友好，限流到 3 是速度与稳定性的折中，想更快可以调大，
      # 但要接受排队和偶发下载失败概率上升的代价。
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Free disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip vim wget xxd zip zlib1g-dev zstd

      - name: Clone ImmortalWrt source
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt
          cd openwrt
          echo "Checked out branch: ${{ env.REPO_BRANCH }}"
          echo "Target: ${{ matrix.target }}/${{ matrix.subtarget }} device=${{ matrix.device }} (${{ matrix.label }})"

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-dl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-ccache

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject turboacc
        working-directory: openwrt
        run: |
          set -euxo pipefail
          curl -fsSL --retry 3 "${{ env.TURBOACC_SCRIPT }}" -o add_turboacc.sh
          bash add_turboacc.sh

      - name: Verify turboacc injection
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # 硬性校验：add_turboacc.sh 声称执行成功(exit 0)不代表它真的往
          # package/ 目录塞了东西——如果内核版本超出它的白名单判断范围但
          # 脚本内部没有用 exit 非 0 处理，就会出现"看起来跑完了，实际
          # 什么都没注入"的静默失败。这里直接在源码树里找有没有对应目录，
          # 而不是等几十分钟后编译完成、打包阶段才靠 kmod 数量去猜。
          FOUND=$(find package -maxdepth 3 -type d \( \
            -iname "*turboacc*" -o \
            -iname "*shortcut-fe*" -o \
            -iname "*fast-classifier*" -o \
            -iname "*fullconenat*" \
          \) 2>/dev/null || true)

          if [ -z "$FOUND" ]; then
            echo "::error::add_turboacc.sh 执行后未在 package/ 目录下找到任何 turboacc/shortcut-fe/fast-classifier/fullconenat 相关目录，注入大概率没有生效(常见原因：本次内核版本不在 add_turboacc.sh 的白名单 6.6/6.12/6.18 内，或上游脚本已变更)，中止构建"
            exit 1
          fi

          echo "检测到以下 turboacc 相关源码目录已注入："
          echo "$FOUND"

      - name: Discover luci-app-turboacc Kconfig options
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # 不凭记忆/网上查到的信息去猜这次 mufeng05 fork 里精确的 Kconfig
          # 符号名，而是直接把这次真实注入进源码树的 Makefile 原文打印
          # 出来，供人工核对。已实测确认该包不存在独立的 Config.in 文件
          # (子选项由 PKG_CONFIG_DEPENDS + LUCI_DEPENDS 的条件依赖语法
          # 自动生成)，因此不再尝试查找/解析 Config.in。
          MAKEFILE=$(find package/turboacc -maxdepth 2 -iname "Makefile" -path "*luci-app-turboacc*" | head -n1 || true)

          echo "=== luci-app-turboacc Makefile 中 PKG_CONFIG_DEPENDS 声明的全部符号 ==="
          if [ -n "$MAKEFILE" ]; then
            echo "文件路径: $MAKEFILE"
            grep -A 20 "PKG_CONFIG_DEPENDS" "$MAKEFILE" || echo "(未找到 PKG_CONFIG_DEPENDS 段)"
            echo "=== LUCI_DEPENDS(条件依赖，可与上面符号名互相印证) ==="
            grep -A 10 "LUCI_DEPENDS" "$MAKEFILE" || echo "(未找到 LUCI_DEPENDS 段)"
          else
            echo "::error::未找到 luci-app-turboacc 的 Makefile，说明注入结构发生了变化，本次 .config 中硬编码的 CONFIG_PACKAGE_TURBOACC_INCLUDE_* 符号可能已不适用，需要人工核实"
            exit 1
          fi

      - name: Generate .config
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # 注意：target/subtarget/device 这几段本身就是小写，且可能含连字符
          # (如 rpi-4、dl-wrx36)，必须原样使用，不能转大写/转下划线，
          # 否则生成的 CONFIG_TARGET_* 符号不存在，make defconfig 会静默丢弃。
          #
          # 三个符号 FLOW_OFFLOADING / BBR_CCA / FULLCONE 已经从这次真实
          # 注入的 package/turboacc/luci-app-turboacc/Makefile 的
          # PKG_CONFIG_DEPENDS 原文里核实过，真实前缀是字面量 TURBOACC，
          # 不是 luci-app-turboacc(那是上一版的错误，实测报
          # "未生效"，因为该符号名根本不存在)。Config.in 文件本就不存在
          # (子选项由 LUCI_DEPENDS 的条件依赖语法自动生成)，所以不再对
          # FULLCONE 做"动态探测、探测不到就跳过硬校验"的处理——三个符号
          # 统一直接硬编码写死，跟设备选择符号一样做强制校验。
          {
            echo "CONFIG_TARGET_${{ matrix.target }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc=m"
            echo "CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=m"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y"
            echo "CONFIG_CCACHE=y"
          } > .config

          make defconfig

          echo "=== defconfig 展开后，.config 中所有 turboacc 相关行(供人工核对四项功能是否符合预期) ==="
          grep -i turboacc .config || echo "(未找到任何 turboacc 相关行)"

      - name: Verify device selection
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # 硬性校验：如果 .config 里找不到我们要求的设备选择项，
          # 说明 matrix 里这条的 target/subtarget/device 名称写错了，
          # 直接失败，不要浪费几十分钟去编译一个没有目标设备的空结果。
          if ! grep -q "^CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y" .config; then
            echo "::error::设备选择项 CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }} 未生效，请核实这个 target/subtarget/device 组合是否存在(可在 make menuconfig 里搜索确认)"
            exit 1
          fi

          # 硬性校验：跟设备符号是同一种失败模式——如果 luci-app-turboacc
          # 这个顶层包 symbol 在 make defconfig 阶段被静默丢弃(比如 Kconfig
          # 依赖没有满足)，"Generate .config" 那一步本身不会报错，必须在
          # 这里主动 grep 出来确认，否则要等几十分钟后编译完成才在打包
          # 阶段发现产物缺失。
          if ! grep -q "^CONFIG_PACKAGE_luci-app-turboacc=m" .config; then
            echo "::error::CONFIG_PACKAGE_luci-app-turboacc=m 未在 .config 中生效，turboacc 包可能未被 defconfig 接受(请检查上一步 Verify turboacc injection 的输出，以及该包在当前内核版本/分支下的 Kconfig 依赖是否满足)"
            exit 1
          fi

          # 硬性校验 FLOW_OFFLOADING / BBR_CCA / FULLCONE：这三个符号名
          # 已经从这次真实注入的 Makefile 的 PKG_CONFIG_DEPENDS 原文中
          # 核实(见 Discover 步骤输出)，前缀是字面量 TURBOACC，不是
          # luci-app-turboacc(上一版用错前缀+错名字"INCLUDE_OFFLOADING"，
          # 导致这里必然报未生效)。如果被 defconfig 静默丢弃，说明这次
          # mufeng05 源码树的依赖关系发生了变化，必须提前拦下来，而不是
          # 等几十分钟后编译完发现 kmod-nft-offload/kmod-tcp-bbr/
          # kmod-nft-fullcone 缺失(即上一版实测遇到的 KMOD_COUNT=0)。
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y 未在 .config 中生效，FastPath 引擎(Flow offloading)对应的内核模块不会被编译，请查看 Discover 步骤输出的 Makefile 原文，确认该符号是否仍然存在/依赖是否满足"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y 未在 .config 中生效，BBR 拥塞控制对应的内核模块不会被编译，请查看 Discover 步骤输出的 Makefile 原文，确认该符号是否仍然存在/依赖是否满足"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y 未在 .config 中生效，全锥形 NAT1 对应的内核模块不会被编译，请查看 Discover 步骤输出的 Makefile 原文，确认该符号是否仍然存在/依赖是否满足"
            exit 1
          fi

          echo "设备与 turboacc 配置校验通过。"
          echo "下面是当前 .config 中 turboacc 相关的完整配置(用于人工核对 FastPath引擎/全锥形NAT/BBR/硬件流量卸载 这四项默认值是否符合预期)："
          grep -i turboacc .config

      - name: Download package sources
        working-directory: openwrt
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

          # 硬失败：下载文件异常小(大概率是网络问题导致的损坏/截断下载)，
          # 不拦下来的话可能几十分钟后编译才炸，白白浪费 CI 时间。
          BAD_FILES="$(find dl -type f -size -1024c)"
          if [ -n "$BAD_FILES" ]; then
            echo "::error::以下下载文件异常过小，可能下载损坏："
            echo "$BAD_FILES"
            exit 1
          fi

      - name: Build firmware and packages
        working-directory: openwrt
        run: |
          set -euxo pipefail
          export CCACHE_DIR="$HOME/.ccache"
          make -j$(nproc) V=s || make -j1 V=s

      - name: Organize build output
        run: |
          set -euxo pipefail
          mkdir -p artifact/targets artifact/packages

          # 固件/镜像产物：直接保留 targets 目录内容，比维护一份可能漏项的
          # 文件名 pattern 列表更稳，不容易漏掉某些平台特有的镜像格式
          # (*.bin/*.itb/*.ubi/*factory* 等)。
          cp -a openwrt/bin/targets/*/* artifact/targets/ 2>/dev/null || true

          # turboacc 相关包：不能只抓 "*turboacc*"，add_turboacc.sh 实际注入的
          # 是 luci-app-turboacc + shortcut-fe + fullconenat + fullconenat-nft
          # 四个包目录，内核模块产物(kmod-fast-classifier、kmod-shortcut-fe-cm
          # 之类)文件名大概率不含 "turboacc" 字样，漏了这些等于只装了个空壳
          # LuCI 界面，底层加速模块根本没打进去。
          #
          # 搜索范围同时包含 bin/packages 和 bin/targets：OpenWrt/ImmortalWrt
          # 的构建产物分两处存放——bin/packages/<arch>/<feed>/ 放的是跟内核
          # 版本无关的通用包(luci、base 等)；而 kmod-* 这类跟当前编译内核
          # vermagic 绑定的内核模块包，只会出现在
          # bin/targets/<target>/<subtarget>/packages/ 下。只搜 bin/packages
          # 会导致 kmod-fast-classifier、kmod-shortcut-fe-cm 这些真正干活的
          # 内核模块被漏掉，装出来的只是一个没有加速能力的 LuCI 空壳。
          #
          # 注意：这里不按扩展名过滤(.ipk / .apk 都要)，因为不同分支/不同
          # 内核阶段 ImmortalWrt 实际产出的包格式并不统一(较新分支默认用
          # apk，命名为"包名-版本.apk"；旧分支/ipk 格式为
          # "包名_版本_架构.ipk")，按扩展名过滤会在包管理器切换的分支上
          # 悄悄漏掉产物。
          #
          # pattern 说明：fullcone NAT 的内核模块在 nftables 版本下叫
          # "kmod-nft-fullcone"(没有 "nat" 后缀)，iptables 版本下才叫
          # "kmod-ipt-fullconenat"/"iptables-mod-fullconenat"(有 "nat")。
          # 用 "*fullcone*" 这个更宽的 pattern 才能同时兼容两种命名，之前
          # 用 "*fullconenat*" 会漏掉 nftables 版本的 kmod-nft-fullcone。
          # "*tcp-bbr*" 对应 turboacc 默认勾选的 BBR 拥塞控制附属功能
          # (kmod-tcp-bbr)，同样需要显式抓取，否则会被漏掉。
          #
          # 教训(实测踩到)：luci-app-turboacc.apk 本身只是 LuCI 控制面板，
          # 真正的"快速转发引擎"加速能力由它在包 metadata 里声明的依赖
          # kmod-nft-offload(fw4/nftables) 提供 —— 这是从 Makefile 的
          # LUCI_DEPENDS 原文里核实的：
          #   +PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING&&PACKAGE_firewall4:kmod-nft-offload
          #   +PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING&&PACKAGE_firewall:kmod-ipt-offload
          # 这个模块文件名不含 turboacc/shortcut-fe/fullcone/tcp-bbr 任何
          # 关键字，之前的 pattern 会把它漏掉，导致只装 luci-app-turboacc.apk
          # 时因为离线安装找不到这个依赖而失败("快速转发引擎"这一项等于
          # 没有)。用 "*nft-offload*" 覆盖 fw4，"*ipt-offload*" 覆盖 fw3，
          # 两个都要抓，不看当前是 fw3 还是 fw4，让产物本身两种情况都能装。
          find openwrt/bin/packages openwrt/bin/targets -type f \( \
            -iname "*turboacc*" -o \
            -iname "*shortcut-fe*" -o \
            -iname "*fast-classifier*" -o \
            -iname "*fullcone*" -o \
            -iname "*tcp-bbr*" -o \
            -iname "*nft-offload*" -o \
            -iname "*ipt-offload*" \
          \) -exec cp -f {} artifact/packages/ \;

          # 规范化改名：主包/中文包 upstream(add_turboacc.sh 每次 curl 下载
          # 的最新版本) 的版本号写法不稳定(观察到过 "luci-app-turboacc-0.apk"
          # 这种没有正经版本号的命名)，与其去 patch upstream Makefile 赌
          # 版本号格式(那是在制造新的上游依赖风险，不是消除)，不如在产物
          # 层面统一改名成固定文件名。
          #
          # 安全性说明：apk/ipk 包管理器识别一个包靠的是包内部的
          # control/metadata(包名、版本、依赖关系都封装在包内)，不是文件名
          # 本身，所以这里对文件名做重命名，对 apk add / opkg install 的
          # 安装行为没有任何影响——只是让下游查找逻辑不用再去猜 upstream
          # 这次到底用了什么版本号写法。
          #
          # 用 mv 而不是额外再复制一份：如果同一个包在目录里同时存在
          # "原始版本号命名" 和 "规范化命名" 两份文件，装的时候
          # apk add ./*.apk 会把它当成两个不同的包尝试重复安装，
          # 所以规范化之后旧文件名必须消失，只保留一份。
          for CANON_NAME in "luci-app-turboacc" "luci-i18n-turboacc-zh-cn"; do
            SRC=$(find artifact/packages -maxdepth 1 -type f -iname "${CANON_NAME}[-_]*" | head -n1 || true)
            if [ -n "$SRC" ]; then
              EXT="${SRC##*.}"
              mv -f "$SRC" "artifact/packages/${CANON_NAME}.${EXT}"
              echo "已规范化改名: $SRC -> artifact/packages/${CANON_NAME}.${EXT}"
            else
              echo "::warning::未找到 ${CANON_NAME} 对应的产物文件，跳过规范化改名(后续 Bundle 步骤会做硬校验)"
            fi
          done

          find artifact -type f | sort

      - name: Clone makeself (pinned release, not tracking a moving branch)
        run: |
          set -euxo pipefail
          # 钉死到具体 release tag，而不是 clone 默认分支最新代码：
          # makeself 上游一旦引入 breaking change，我们的 CI 不应该在毫无
          # 征兆的情况下某天突然坏掉。发现新版本需要的话手动升这个 tag。
          git clone --depth=1 --branch release-2.7.1 https://github.com/megastep/makeself.git

      - name: Bundle turboacc into a self-extracting run file (makeself)
        run: |
          set -euxo pipefail
          # 不再手搓 marker+tail 的自解压逻辑，改用 makeself：它是被
          # OpenWrt/嵌入式圈子长期验证过的成熟工具，内置 CRC/SHA256 完整性
          # 校验(用户在路由器上执行时，文件传输损坏会被直接拦下来，而不是
          # 等 tar 解压到一半才报个不明所以的错)，比自己维护提取逻辑更稳。
          #
          # 主包/中文包在上一步"Organize build output"里已经被规范化改名成
          # 固定文件名(luci-app-turboacc.apk 或 .ipk / 同理中文包)，这里
          # 直接按固定名找，不用再去猜 upstream 这次用的是什么版本号写法
          # (apk 的 "-0" 连字符命名 还是 ipk 的 "_版本_架构" 下划线命名)。
          MAIN_PKG=$(find artifact/packages -maxdepth 1 -type f -iname "luci-app-turboacc.*" | head -n1 || true)
          I18N_PKG=$(find artifact/packages -maxdepth 1 -type f -iname "luci-i18n-turboacc-zh-cn.*" | head -n1 || true)
          KMOD_COUNT=$(find artifact/packages -maxdepth 1 -type f -iname "kmod-*" | wc -l)

          # 缺主包/中文包直接硬失败(::error:: + exit 1)，不允许静默跳过。
          # 构建产物不完整应该让本次 job 直接标红，而不是放过去让用户拿到
          # 一个残次 artifact 却毫无提示。
          if [ -z "$MAIN_PKG" ] || [ -z "$I18N_PKG" ]; then
            echo "::error::没找到主包(luci-app-turboacc)或中文包(luci-i18n-turboacc-zh-cn)，构建产物不完整，中止打包"
            echo "当前 artifact/packages 目录内容："
            ls -lh artifact/packages/ || true
            exit 1
          fi

          echo "已找到主包: $MAIN_PKG"
          echo "已找到中文包: $I18N_PKG"

          # 同样硬性校验：一个 kmod 都没找到，大概率是 add_turboacc.sh
          # 本身在这个内核版本上没有产出 kmod，或者上一步的搜索范围没生效。
          # 不能让它悄悄流出去变成一个没有加速能力的空壳安装包。
          if [ "$KMOD_COUNT" -eq 0 ]; then
            echo "::error::未找到任何 kmod-* 内核模块包，turboacc 的加速能力无法工作，中止打包(请检查 openwrt/bin/targets 下是否真的生成了 kmod，以及 Verify turboacc injection 步骤的输出)"
            exit 1
          fi

          # 硬性校验(实测踩到的坑)：luci-app-turboacc.apk 只是 LuCI 控制
          # 面板，它在 apk metadata 里声明依赖 kmod-nft-offload(fw4) 或
          # kmod-ipt-offload(fw3) 才能提供"快速转发引擎"这个核心加速能力
          # (依据 Makefile LUCI_DEPENDS 原文，见上面 Organize build output
          # 步骤的注释)。这个文件名不含 turboacc/fullcone/tcp-bbr 等关键字，
          # 早期版本的搜索 pattern 会漏掉它，实测后果是：只单独安装
          # luci-app-turboacc.apk 时，apk 因为离线找不到这个依赖而装不上，
          # "快速转发引擎"这一项形同虚设。这里不满足于"有 kmod 就行"的
          # KMOD_COUNT 判断，必须显式确认 offload 模块存在，否则直接拦下来。
          OFFLOAD_COUNT=$(find artifact/packages -maxdepth 1 -type f \( -iname "*nft-offload*" -o -iname "*ipt-offload*" \) | wc -l)
          if [ "$OFFLOAD_COUNT" -eq 0 ]; then
            echo "::error::未找到 kmod-nft-offload/kmod-ipt-offload，luci-app-turboacc 依赖的快速转发引擎(Flow Offloading)内核模块缺失，仅安装 luci-app-turboacc.apk 会因依赖无法解析而失败，中止打包(请检查 Organize build output 步骤的搜索范围)"
            exit 1
          fi
          echo "已确认快速转发引擎依赖的 offload 内核模块存在(共 $OFFLOAD_COUNT 个)"

          PKGDIR="turboacc-pkg"
          mkdir -p "$PKGDIR"
          find artifact/packages -maxdepth 1 -type f \( \
            -iname "*turboacc*" -o \
            -iname "*shortcut-fe*" -o \
            -iname "*fast-classifier*" -o \
            -iname "*fullcone*" -o \
            -iname "*tcp-bbr*" -o \
            -iname "*nft-offload*" -o \
            -iname "*ipt-offload*" \
          \) -exec cp -f {} "$PKGDIR/" \;

          echo "本次打进 $PKGDIR 的文件(含 $KMOD_COUNT 个 kmod)："
          ls -lh "$PKGDIR"

          # install.sh 用带引号的 <<'EOF'，确保 $0/$?/$MAIN_PKG 这些变量
          # 是字面量原样写进文件，留到路由器上运行时才求值。这里踩过反面
          # 教材：如果写成不带引号的 <<EOF，$? 会在"生成这个文件的当下"
          # 就被展开成 CI 里上一条命令的退出码，跟路由器上实际装没装成功
          # 毫无关系——检查形同虚设。
          cat > "$PKGDIR/install.sh" <<'EOF'
          #!/bin/sh
          # turboacc 安装脚本 (由 makeself 解压后在临时目录里执行，
          # 当前目录下就是本包除 install.sh 外的全部文件，直接按扩展名
          # 批量装，不用逐个猜文件名)
          set -e

          EXPECTED_TARGET="__EXPECTED_TARGET__"
          EXPECTED_SUBTARGET="__EXPECTED_SUBTARGET__"

          # 平台校验：防止把 A 设备编译的包装到 B 设备上导致驱动/内核
          # 模块不匹配。/etc/openwrt_release 里的 DISTRIB_TARGET 格式固定
          # 为 "target/subtarget"，这是 OpenWrt/ImmortalWrt 的标准字段。
          if [ -f /etc/openwrt_release ]; then
            . /etc/openwrt_release
            CUR_TARGET="${DISTRIB_TARGET%%/*}"
            CUR_SUBTARGET="${DISTRIB_TARGET#*/}"
            if [ -n "$CUR_TARGET" ] && { [ "$CUR_TARGET" != "$EXPECTED_TARGET" ] || [ "$CUR_SUBTARGET" != "$EXPECTED_SUBTARGET" ]; }; then
              echo "警告: 当前设备平台为 ${CUR_TARGET}/${CUR_SUBTARGET}，" >&2
              echo "     本安装包编译目标为 ${EXPECTED_TARGET}/${EXPECTED_SUBTARGET}，两者不匹配。" >&2
              echo "     继续安装可能导致内核模块加载失败甚至设备无法正常启动。" >&2
              printf "是否仍要继续安装? [y/N] "
              read -r ANS
              case "$ANS" in
                y|Y) : ;;
                *) echo "已取消安装"; exit 1 ;;
              esac
            fi
          fi

          # 统计当前目录(makeself 解压出来的临时目录)下的 apk/ipk 数量。
          # 注意用 ./*.apk 这种带路径的通配写法，而不是裸文件名——OpenWrt
          # 官方已确认 apk add 裸文件名/纯包名会先去联网刷新仓库索引，
          # 网络不通时会等超时才退回装本地文件(见 openwrt/openwrt#17490)，
          # 带路径前缀能让 apk 明确识别这是本地文件。
          APK_COUNT=$(find . -maxdepth 1 -type f -iname '*.apk' | wc -l)
          IPK_COUNT=$(find . -maxdepth 1 -type f -iname '*.ipk' | wc -l)

          if [ "$APK_COUNT" -gt 0 ] && [ "$IPK_COUNT" -gt 0 ]; then
            echo "错误: 当前目录同时存在 .apk 和 .ipk，无法判定应该用哪个包管理器" >&2
            exit 1
          fi

          echo "本次安装包含以下文件："
          find . -maxdepth 1 -type f \( -iname '*.apk' -o -iname '*.ipk' \) -exec basename {} \;

          if [ "$APK_COUNT" -gt 0 ]; then
            if ! command -v apk >/dev/null 2>&1; then
              echo "错误: 安装包为 apk 格式，但系统未找到 apk 命令" >&2
              exit 1
            fi
            echo "正在安装当前目录下全部 apk 包 (主程序 + 中文包 + 加速内核模块)..."
            # --no-network: 明确告诉 apk 这是纯本地安装，不要去联网刷新
            # 仓库索引——既避免离线路由器上无意义的联网重试和超时等待，
            # 也避免被当成仓库包名去解析而不是按本地文件处理。
            set -- ./*.apk
            apk add --no-network --allow-untrusted "$@"
          elif [ "$IPK_COUNT" -gt 0 ]; then
            if ! command -v opkg >/dev/null 2>&1; then
              echo "错误: 安装包为 ipk 格式，但系统未找到 opkg 命令" >&2
              exit 1
            fi
            echo "正在安装当前目录下全部 ipk 包 (主程序 + 中文包 + 加速内核模块)..."
            set -- ./*.ipk
            opkg install "$@"
          else
            echo "错误: 当前目录未找到可安装的 apk/ipk 包，安装中止" >&2
            exit 1
          fi

          echo "安装完成，请到 LuCI -> 服务 或 网络 中查看 turboacc"
          EOF

          # EXPECTED_TARGET/EXPECTED_SUBTARGET 占位符替换成本次矩阵的真实
          # 值，这一步跟上面 heredoc 的引号无关，纯粹是生成阶段的文本替换。
          sed -i "s/__EXPECTED_TARGET__/${{ matrix.target }}/; s/__EXPECTED_SUBTARGET__/${{ matrix.subtarget }}/" "$PKGDIR/install.sh"
          chmod +x "$PKGDIR/install.sh"

          INSTALLER="turboacc-install-${{ matrix.name }}.run"
          ./makeself/makeself.sh --sha256 "$PKGDIR" "$INSTALLER" "TurboACC installer for ${{ matrix.label }}" ./install.sh

          # 自检：用 makeself 自带的 --check 校验内嵌 SHA256，只验证完整性，
          # 不会触发 install.sh 真正执行，在 CI 阶段就能发现"打出来的
          # .run 本身已经损坏"这种问题，而不是等用户在路由器上才发现。
          sh "$INSTALLER" --check
          echo "自检通过: $INSTALLER 完整性校验正常"

          mv "$INSTALLER" artifact/packages/
          ls -lh "artifact/packages/$INSTALLER"

      - name: Package as zip
        run: |
          set -euxo pipefail
          # 统一打成单一 zip 文件，文件名固定为
          # immortalwrt-<分支>-<matrix.name>-turboacc.zip，跟矩阵条目一一
          # 对应。GitHub Actions 的 upload-artifact 本身也会在下载时自动
          # 打 zip，但那个 zip 名字是 Actions 平台生成的，不受我们控制；
          # 这里自己显式打一个命名规范的 zip，是为了让脚本化下载(比如用
          # gh CLI 或 API 批量拉取多个平台产物)时能直接按可预期的文件名
          # 处理，不用再解析 Actions 页面上的 artifact 名称。
          ZIP_NAME="immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc.zip"
          (cd artifact && zip -r "../$ZIP_NAME" .)

          echo "zip 内容清单："
          unzip -l "$ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc
          path: immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc.zip
          retention-days: 7
          if-no-files-found: error
