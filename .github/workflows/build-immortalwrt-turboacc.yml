name: Build ImmortalWrt x86_64 with turboacc

on:
  workflow_dispatch:
    inputs:
      repo_branch:
        description: '要编译的 ImmortalWrt 分支'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - openwrt-24.10

permissions:
  contents: read

concurrency:
  group: build-immortalwrt-${{ github.event.inputs.repo_branch }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.repo_branch }}
  TARGET: x86
  SUBTARGET: 64
  DEVICE: generic
  TURBOACC_SCRIPT: https://raw.githubusercontent.com/mufeng05/turboacc/main/add_turboacc.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip vim wget xxd zlib1g-dev zstd

      - name: Clone ImmortalWrt source
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt
          cd openwrt
          echo "Checked out branch: ${{ env.REPO_BRANCH }}"

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-dl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-ccache

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject turboacc
        working-directory: openwrt
        run: |
          set -euxo pipefail
          curl -fsSL --retry 3 "${{ env.TURBOACC_SCRIPT }}" -o add_turboacc.sh
          bash add_turboacc.sh

      - name: Generate .config
        working-directory: openwrt
        run: |
          set -euxo pipefail
          cat > .config <<EOF
          CONFIG_TARGET_${{ env.TARGET }}=y
          CONFIG_TARGET_${{ env.TARGET }}_${{ env.SUBTARGET }}=y
          CONFIG_TARGET_${{ env.TARGET }}_${{ env.SUBTARGET }}_DEVICE_${{ env.DEVICE }}=y
          CONFIG_PACKAGE_luci-app-turboacc=m
          CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=m
          CONFIG_CCACHE=y
          EOF
          make defconfig

      - name: Show turboacc-related config
        working-directory: openwrt
        run: |
          set -euxo pipefail
          grep -i turboacc .config
          grep -i ccache .config

      - name: Download package sources
        working-directory: openwrt
        run: |
          set -euxo pipefail
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: Build firmware and packages
        working-directory: openwrt
        run: |
          set -euxo pipefail
          export CCACHE_DIR="$HOME/.ccache"
          make -j$(nproc) V=s || make -j1 V=s

      - name: Organize build output
        run: |
          set -euxo pipefail
          mkdir -p artifact
          find openwrt/bin/targets -type f \( \
            -name "*.img.gz" -o \
            -name "*combined*" -o \
            -name "*sysupgrade*" -o \
            -name "*.manifest" -o \
            -name "sha256sums" \
          \) -exec cp -f {} artifact/ \;
          find openwrt/bin/packages -type f -iname "*turboacc*" -exec cp -f {} artifact/ \;
          ls -lh artifact/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-turboacc
          path: artifact/
          retention-days: 7
