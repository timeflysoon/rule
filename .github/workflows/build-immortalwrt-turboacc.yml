name: Build ImmortalWrt Multi-Target TurboACC Packages

# 每个 subtarget 选一个代表设备编译，产物仅包含
# luci-app-turboacc / luci-i18n-turboacc-zh-cn 两个包本身，
# 依赖的 kmod 由官方源自动解析，不在此打包。
#
# 依赖 add_turboacc.sh 的内核版本白名单（当前 6.6/6.12/6.18），
# 不在白名单内会静默失败。
#
# 包命名：apk 用连字符，ipk 用下划线，二者不可混用/不做重命名。
#
# 已知坑（勿回退）：
# 1) turboacc 目录是 cp -rf 硬拷贝进来的，不在 git 树里，
#    导致 luci.mk 的 findrev 拿不到版本，PKG_VERSION 退化成 0。
# 2) luci-i18n-turboacc-zh-cn 不是独立包目录，是同一个 Makefile
#    里由 LuciTranslation 宏展开出的 Package 段，用的是独立的
#    PKG_PO_VERSION 变量，必须和 PKG_VERSION 一起显式赋值，
#    只写一个不会带出另一个。
# 3) 校验步骤不能把整个 apk 当成普通单一 tar.gz 直接 tar -tzf。
#    APK v2 是多个串接的 gzip stream / tar segment，.PKGINFO 在
#    control 段里。必须按 gzip members 顺序解开，再逐段找 .PKGINFO，
#    然后读取其中的 "pkgver = " 字段。
# 4) 单独 make package/.../compile（而非完整固件编译）不会自动
#    触发 tools/install 和 toolchain/install，staging_dir/host/bin
#    下的 openssl/sed 等 host 工具会缺失，编译时报 Error 127。
#    必须在编译目标 package 之前显式跑这两步。
# 5) upload-artifact 自身会把上传内容打成 zip 供下载，不要再手动
#    zip 一层上传，否则下载下来是 zip 套 zip。
# 6) 仅执行 tools/install + toolchain/install 仍不足以覆盖内核相关依赖。
#    turboacc 勾选的 flow offload/fullcone/BBR 等选项会拉起 kernel/kmod
#    依赖链，进而触发 package/kernel/linux 打包；package/kernel/linux
#    的打包逻辑直接读取 $(LINUX_DIR)/.config、modules.builtin、
#    modules.builtin.modinfo，这些文件由 target/linux/compile 产出，
#    不会被单独的 package 编译自动触发。必须在编译目标 package 之前
#    显式先跑一次 make target/linux/compile，否则会在
#    package/kernel/linux 阶段报 "can't open .config" /
#    "cannot stat modules.builtin" 并整体失败。

on:
  workflow_dispatch:
    inputs:
      repo_branch:
        description: '要编译的 ImmortalWrt 分支'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - openwrt-24.10
      build_scope:
        description: '编译范围 (按厂商分类, all = 全部代表机型)'
        required: true
        default: 'x86'
        type: choice
        options:
          - all
          - x86
          - arm
          - rockchip
          - mediatek
          - qualcomm
          - broadcom

permissions:
  contents: read

concurrency:
  group: build-immortalwrt-${{ github.event.inputs.repo_branch }}-${{ github.event.inputs.build_scope }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.repo_branch }}
  TURBOACC_SCRIPT: https://raw.githubusercontent.com/mufeng05/turboacc/main/add_turboacc.sh
  TURBOACC_REPO: https://github.com/mufeng05/turboacc

jobs:
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        run: |
          set -euxo pipefail

          cat > full_matrix.json <<'EOF'
          [
            {
              "name": "x86_64",
              "label": "x86_64 (PC/UEFI/VM)",
              "vendor": "x86",
              "target": "x86",
              "subtarget": "64",
              "device": "generic"
            },
            {
              "name": "armsr_armv8",
              "label": "ARM64 通用 (UEFI/VM/SBC)",
              "vendor": "arm",
              "target": "armsr",
              "subtarget": "armv8",
              "device": "generic"
            },
            {
              "name": "armsr_armv7",
              "label": "ARM32 通用 (UEFI/VM/SBC)",
              "vendor": "arm",
              "target": "armsr",
              "subtarget": "armv7",
              "device": "generic"
            },
            {
              "name": "rockchip_nanopi_r2s",
              "label": "FriendlyARM NanoPi R2S (RK3328, 代表 rockchip/armv8 全系)",
              "vendor": "rockchip",
              "target": "rockchip",
              "subtarget": "armv8",
              "device": "friendlyarm_nanopi-r2s"
            },
            {
              "name": "mediatek_filogic_redmi_ax6000",
              "label": "红米 AX6000 (联发科 MT7986/Filogic)",
              "vendor": "mediatek",
              "target": "mediatek",
              "subtarget": "filogic",
              "device": "xiaomi_redmi-router-ax6000"
            },
            {
              "name": "mediatek_mt7622_linksys_e8450",
              "label": "Linksys E8450 (联发科 MT7622)",
              "vendor": "mediatek",
              "target": "mediatek",
              "subtarget": "mt7622",
              "device": "linksys_e8450-ubi"
            },
            {
              "name": "ramips_mt7621_xiaomi_4a",
              "label": "小米路由器 4A 千兆版 (联发科 MT7621, target 历史上归在 ramips)",
              "vendor": "mediatek",
              "target": "ramips",
              "subtarget": "mt7621",
              "device": "xiaomi_mi-router-4a-gigabit"
            },
            {
              "name": "ipq806x_netgear_r7800",
              "label": "Netgear R7800 (高通 IPQ8065)",
              "vendor": "qualcomm",
              "target": "ipq806x",
              "subtarget": "generic",
              "device": "netgear_r7800"
            },
            {
              "name": "ipq40xx_linksys_ea8300",
              "label": "Linksys EA8300 (高通 IPQ4019)",
              "vendor": "qualcomm",
              "target": "ipq40xx",
              "subtarget": "generic",
              "device": "linksys_ea8300"
            },
            {
              "name": "qualcommax_ipq807x_dl_wrx36",
              "label": "Dynalink DL-WRX36 (高通 IPQ807x, WiFi6E)",
              "vendor": "qualcomm",
              "target": "qualcommax",
              "subtarget": "ipq807x",
              "device": "dynalink_dl-wrx36"
            },
            {
              "name": "bcm27xx_rpi4",
              "label": "树莓派 4 (博通 BCM2711)",
              "vendor": "broadcom",
              "target": "bcm27xx",
              "subtarget": "bcm2711",
              "device": "rpi-4"
            },
            {
              "name": "bcm4908_asus_gt_ac5300",
              "label": "ASUS GT-AC5300 (博通 BCM4908, 设备名待核实)",
              "vendor": "broadcom",
              "target": "bcm4908",
              "subtarget": "generic",
              "device": "asus_gt-ac5300"
            },
            {
              "name": "bcm53xx_netgear_r8000",
              "label": "Netgear R8000 (博通 BCM4709, 设备名待核实)",
              "vendor": "broadcom",
              "target": "bcm53xx",
              "subtarget": "generic",
              "device": "netgear_r8000"
            }
          ]
          EOF

          SCOPE="${{ github.event.inputs.build_scope }}"
          if [ "$SCOPE" = "all" ]; then
            MATRIX=$(jq -c '{include: .}' full_matrix.json)
          else
            MATRIX=$(jq -c --arg v "$SCOPE" '{include: [ .[] | select(.vendor == $v) ]}' full_matrix.json)
          fi

          COUNT=$(echo "$MATRIX" | jq '.include | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::build_scope='$SCOPE' 没有匹配到任何矩阵条目"
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "本次将编译 $COUNT 个平台："
          echo "$MATRIX" | jq -r '.include[] | "  - \(.label) [\(.target)/\(.subtarget)/\(.device)]"'

  build:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip vim wget xxd zip zlib1g-dev zstd

      - name: Clone ImmortalWrt source
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt
          cd openwrt
          echo "Checked out branch: ${{ env.REPO_BRANCH }}"
          echo "Target: ${{ matrix.target }}/${{ matrix.subtarget }} device=${{ matrix.device }} (${{ matrix.label }})"

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-dl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-ccache

      - name: Update & install feeds
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject turboacc
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL --retry 3 "${{ env.TURBOACC_SCRIPT }}" -o add_turboacc.sh
          bash add_turboacc.sh

      - name: Fix turboacc PKG_VERSION / PKG_PO_VERSION
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          # 主包用 PKG_VERSION、i18n 子包用 PKG_PO_VERSION，二者互不继承，
          # 必须同时显式赋值，否则各自独立 findrev 失败退化成 0。
          MAKEFILE="package/turboacc/luci-app-turboacc/Makefile"

          if [ ! -f "$MAKEFILE" ]; then
            echo "::error::$MAKEFILE 不存在，turboacc 注入结构已变化"
            exit 1
          fi

          if grep -q "^PKG_VERSION:=" "$MAKEFILE" && grep -q "^PKG_PO_VERSION:=" "$MAKEFILE"; then
            echo "PKG_VERSION 和 PKG_PO_VERSION 均已存在，跳过修补"
          else
            TMP_TURBOACC=$(mktemp -d)
            git clone --depth=50 --single-branch "${{ env.TURBOACC_REPO }}" "$TMP_TURBOACC"

            COMMIT_INFO=$(git -C "$TMP_TURBOACC" log -1 --format="%ct %h" --abbrev=7 -- custom/luci-app-turboacc lede/luci-app-turboacc)
            rm -rf "$TMP_TURBOACC"

            if [ -z "$COMMIT_INFO" ]; then
              echo "::error::无法从 turboacc 源仓库拿到 git log"
              exit 1
            fi

            COMMIT_TS=$(echo "$COMMIT_INFO" | cut -d' ' -f1)
            COMMIT_HASH=$(echo "$COMMIT_INFO" | cut -d' ' -f2)
            SECS=$(( COMMIT_TS % 86400 ))
            YDAY=$(date --utc --date="@${COMMIT_TS}" "+%y.%j")
            BUILD_VERSION=$(printf '%s.%05d~%s' "$YDAY" "$SECS" "$COMMIT_HASH")

            # 须在 luci.mk 的 ?= 条件赋值之前生效，故插在 PKG_NAME 行后
            sed -i "/^PKG_NAME:=/a PKG_VERSION:=${BUILD_VERSION}\nPKG_PO_VERSION:=${BUILD_VERSION}\nPKG_RELEASE:=1" "$MAKEFILE"
            echo "已注入 PKG_VERSION:=${BUILD_VERSION} / PKG_PO_VERSION:=${BUILD_VERSION} / PKG_RELEASE:=1"
          fi

          echo "=== 修补后的 Makefile 头部 ==="
          head -n 12 "$MAKEFILE"

      - name: Verify turboacc injection
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          # add_turboacc.sh exit 0 不代表注入成功（内核版本超出白名单会静默跳过）
          FOUND=$(find package -maxdepth 3 -type d \( \
            -iname "*turboacc*" -o \
            -iname "*shortcut-fe*" -o \
            -iname "*fast-classifier*" -o \
            -iname "*fullconenat*" \
          \) 2>/dev/null || true)

          if [ -z "$FOUND" ]; then
            echo "::error::未找到 turboacc 相关目录，注入大概率未生效(内核版本不在白名单 6.6/6.12/6.18 内，或上游脚本已变更)"
            exit 1
          fi

          echo "检测到以下 turboacc 相关源码目录已注入："
          echo "$FOUND"

          MK="package/turboacc/luci-app-turboacc/Makefile"
          VER=$(grep "^PKG_VERSION:=" "$MK" | head -n1 | cut -d'=' -f2 | tr -d ' \t')
          PO_VER=$(grep "^PKG_PO_VERSION:=" "$MK" | head -n1 | cut -d'=' -f2 | tr -d ' \t')
          echo "PKG_VERSION=${VER:-<未设置>}  PKG_PO_VERSION=${PO_VER:-<未设置>}"
          if [ -z "$VER" ] || [ "$VER" = "0" ]; then
            echo "::error::PKG_VERSION 缺失或为 0"
            exit 1
          fi
          if [ -z "$PO_VER" ] || [ "$PO_VER" = "0" ]; then
            echo "::error::PKG_PO_VERSION 缺失或为 0"
            exit 1
          fi

      - name: Discover luci-app-turboacc Kconfig options
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          MAKEFILE=$(find package/turboacc -maxdepth 2 -iname "Makefile" -path "*luci-app-turboacc*" | head -n1 || true)

          if [ -n "$MAKEFILE" ]; then
            echo "=== PKG_CONFIG_DEPENDS ==="
            grep -A 20 "PKG_CONFIG_DEPENDS" "$MAKEFILE" || echo "(未找到)"
            echo "=== LUCI_DEPENDS ==="
            grep -A 10 "LUCI_DEPENDS" "$MAKEFILE" || echo "(未找到)"
          else
            echo "::error::未找到 luci-app-turboacc 的 Makefile，注入结构已变化"
            exit 1
          fi

      - name: Generate .config
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          # target/subtarget/device 原样小写(可能含连字符如 rpi-4)，
          # 转大写/转下划线会导致符号不存在、被 defconfig 静默丢弃
          {
            echo "CONFIG_TARGET_${{ matrix.target }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc=m"
            echo "CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=m"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y"
            echo "CONFIG_CCACHE=y"
          } > .config

          make defconfig

          echo "=== defconfig 展开后 .config 中所有 turboacc 相关行 ==="
          grep -i turboacc .config || echo "(未找到任何 turboacc 相关行)"

      - name: Verify device selection
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          if ! grep -q "^CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y" .config; then
            echo "::error::设备选择项未生效，请核实 target/subtarget/device 组合是否存在"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_luci-app-turboacc=m" .config; then
            echo "::error::CONFIG_PACKAGE_luci-app-turboacc=m 未生效"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y 未生效"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y 未生效"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y 未生效"
            exit 1
          fi

          echo "设备与 turboacc 配置校验通过。"
          grep -i turboacc .config

      - name: Download package sources
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

          BAD_FILES="$(find dl -type f -size -1024c)"
          if [ -n "$BAD_FILES" ]; then
            echo "::error::以下下载文件异常过小，可能下载损坏："
            echo "$BAD_FILES"
            exit 1
          fi

      - name: Prepare host tools and toolchain
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          # 单独 make package/.../compile 不会自动触发 tools/toolchain
          # 构建，staging_dir/host/bin 下的 openssl/sed 等 host 工具
          # 会缺失，package 编译直接 Error 127。必须显式先跑这两步。
          make tools/install -j"$(nproc)"
          make toolchain/install -j"$(nproc)"

      - name: Prepare target kernel artifacts
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          export CCACHE_DIR="$HOME/.ccache"
          # 关键修复：仅 tools/toolchain 还不够。turboacc 开启的
          # flow offload / fullcone / BBR 等选项会拉起 kernel/kmod
          # 依赖链，进而触发 package/kernel/linux 打包；该打包逻辑
          # 直接读取 $(LINUX_DIR)/.config、modules.builtin、
          # modules.builtin.modinfo，这些文件由 target/linux/compile
          # 产出，不会被单独的 package 编译自动触发。必须显式先跑一次。
          make target/linux/compile -j"$(nproc)" V=s || \
          make target/linux/compile -j1 V=s

          echo "=== kernel artifacts ==="
          find build_dir -type f \( \
            -path "*/linux-*/.config" -o \
            -path "*/linux-*/modules.builtin" -o \
            -path "*/linux-*/modules.builtin.modinfo" \
          \) | sort || true

          if ! find build_dir -type f -name "modules.builtin" -path "*/linux-*" | grep -q .; then
            echo "::error::target/linux/compile 后仍未生成 modules.builtin，内核构建未就绪"
            exit 1
          fi

      - name: Build turboacc packages only
        working-directory: openwrt
        shell: bash
        run: |
          set -euxo pipefail
          export CCACHE_DIR="$HOME/.ccache"
          make package/turboacc/luci-app-turboacc/compile -j"$(nproc)" V=s || \
          make package/turboacc/luci-app-turboacc/compile -j1 V=s

      - name: Organize package output
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifact/packages

          # 不重命名，原样保留 apk(连字符)/ipk(下划线) 命名
          find openwrt/bin/packages openwrt/bin/targets -type f \( \
            -iname "luci-app-turboacc-*.apk" -o \
            -iname "luci-app-turboacc_*.ipk" -o \
            -iname "luci-i18n-turboacc-zh-cn-*.apk" -o \
            -iname "luci-i18n-turboacc-zh-cn_*.ipk" \
          \) -exec cp -f {} artifact/packages/ \;

          echo "=== artifact/packages 内容 ==="
          find artifact/packages -maxdepth 1 -type f | sort

          COUNT=$(find artifact/packages -maxdepth 1 -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::artifact/packages 为空，未收集到任何目标包"
            exit 1
          fi

      - name: Verify package metadata versions (not just filenames)
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import io
          import os
          import pathlib
          import re
          import subprocess
          import sys
          import tarfile
          import tempfile
          import zlib

          PKG_DIR = pathlib.Path("artifact/packages")

          def split_gzip_members(blob: bytes):
              parts = []
              rest = blob
              index = 0
              while rest:
                  dz = zlib.decompressobj(16 + zlib.MAX_WBITS)
                  try:
                      out = dz.decompress(rest)
                      out += dz.flush()
                  except zlib.error as e:
                      raise RuntimeError(f"gzip member #{index + 1} 解压失败: {e}") from e

                  consumed = len(rest) - len(dz.unused_data)
                  if consumed <= 0:
                      raise RuntimeError(
                          f"无法推进到下一个 gzip member（offset={len(blob) - len(rest)}）"
                      )

                  parts.append(out)
                  rest = dz.unused_data
                  index += 1
              return parts

          def apk_pkgver(path: pathlib.Path):
              raw = path.read_bytes()
              members = split_gzip_members(raw)

              for idx, member in enumerate(members, start=1):
                  try:
                      with tarfile.open(fileobj=io.BytesIO(member), mode="r:") as tf:
                          for name in tf.getnames():
                              norm = name[2:] if name.startswith("./") else name
                              if norm == ".PKGINFO" or norm.endswith("/.PKGINFO"):
                                  fp = tf.extractfile(name)
                                  if fp is None:
                                      raise RuntimeError(f"无法读取 {name}")
                                  text = fp.read().decode("utf-8", errors="replace")
                                  for line in text.splitlines():
                                      if line.startswith("pkgver = "):
                                          return line.split(" = ", 1)[1].strip(), idx, name
                                  raise RuntimeError(".PKGINFO 中没有 pkgver = 字段")
                  except tarfile.TarError:
                      continue

              raise RuntimeError("遍历所有 gzip/tar 段后仍未找到 .PKGINFO")

          def ipk_version(path: pathlib.Path):
              with tempfile.TemporaryDirectory() as td:
                  members = subprocess.check_output(["ar", "t", str(path)], text=True).splitlines()
                  control_member = None
                  for m in members:
                      m = m.strip()
                      if m.startswith("control.tar"):
                          control_member = m
                          break

                  if not control_member:
                      raise RuntimeError("ar 成员中找不到 control.tar.*")

                  with open(os.devnull, "wb") as devnull:
                      subprocess.check_call(
                          ["ar", "x", str(path), control_member],
                          cwd=td,
                          stdout=devnull,
                          stderr=devnull,
                      )

                  control_path = pathlib.Path(td) / control_member
                  if not control_path.is_file():
                      raise RuntimeError(f"未成功提取 {control_member}")

                  with tarfile.open(control_path, mode="r:*") as tf:
                      control_name = None
                      for name in tf.getnames():
                          if os.path.basename(name) == "control":
                              control_name = name
                              break

                      if not control_name:
                          raise RuntimeError("control 压缩包里找不到 control 文件")

                      fp = tf.extractfile(control_name)
                      if fp is None:
                          raise RuntimeError(f"无法读取 {control_name}")
                      text = fp.read().decode("utf-8", errors="replace")

                      for line in text.splitlines():
                          if line.startswith("Version:"):
                              return line.split(":", 1)[1].strip(), control_member, control_name

              raise RuntimeError("control 文件里没有 Version: 字段")

          pkgs = sorted([p for p in PKG_DIR.iterdir() if p.is_file()])
          if not pkgs:
              print("::error::artifact/packages 为空", flush=True)
              sys.exit(1)

          fail = False
          for pkg in pkgs:
              try:
                  if pkg.suffix == ".apk":
                      ver, member_idx, entry = apk_pkgver(pkg)
                      detail = f"apk member#{member_idx} entry={entry}"
                  elif pkg.suffix == ".ipk":
                      ver, control_member, entry = ipk_version(pkg)
                      detail = f"ipk member={control_member} entry={entry}"
                  else:
                      continue

                  if (not ver) or ver == "0" or re.match(r"^0([\-~]|$)", ver):
                      print(f"::error::{pkg} 包内元数据版本号是 '{ver or '<空>'}' ({detail})", flush=True)
                      fail = True
                  else:
                      print(f"[OK] {pkg.name} -> version = {ver} ({detail})", flush=True)

              except Exception as e:
                  print(f"::error::{pkg} 解析失败: {e}", flush=True)
                  fail = True

          if fail:
              print("::error::存在版本号异常的包，构建判定失败", flush=True)
              sys.exit(1)
          PY

      - name: Verify turboacc packages exist
        shell: bash
        run: |
          set -euxo pipefail
          MAIN_PKG=$(find artifact/packages -maxdepth 1 -type f \( \
            -iname "luci-app-turboacc-*.apk" -o \
            -iname "luci-app-turboacc_*.ipk" \
          \) | head -n1 || true)

          I18N_PKG=$(find artifact/packages -maxdepth 1 -type f \( \
            -iname "luci-i18n-turboacc-zh-cn-*.apk" -o \
            -iname "luci-i18n-turboacc-zh-cn_*.ipk" \
          \) | head -n1 || true)

          if [ -z "$MAIN_PKG" ] || [ -z "$I18N_PKG" ]; then
            echo "::error::没找到主包或中文包，构建产物不完整"
            ls -lh artifact/packages/ || true
            exit 1
          fi

          echo "已找到主包: $MAIN_PKG"
          echo "已找到中文包: $I18N_PKG"
          echo ""
          echo "安装方式(路由器需能访问官方源以解析依赖)："
          echo "  apk 分支: apk add --allow-untrusted ./luci-app-turboacc-*.apk ./luci-i18n-turboacc-zh-cn-*.apk"
          echo "  opkg 分支: opkg install ./luci-app-turboacc_*.ipk ./luci-i18n-turboacc-zh-cn_*.ipk"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc
          path: artifact/packages/
          retention-days: 7
          if-no-files-found: error
