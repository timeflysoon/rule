name: Build ImmortalWrt Multi-Target TurboACC Packages

# 每个 subtarget 选一个代表设备编译。同一 subtarget 下所有型号共享
# 内核/kmod ABI，代表设备编出的 luci-app-turboacc / luci-i18n-turboacc-zh-cn
# 对该 subtarget 下所有设备通用。
#
# 产物只包含 luci-app-turboacc 和 luci-i18n-turboacc-zh-cn 这两个包本身。
# 它们依赖的 kmod-nft-offload / kmod-tcp-bbr / kmod-nft-fullcone 等属于
# ImmortalWrt 官方软件源的标准包，与是否安装 turboacc 无关，由 opkg/apk
# 在路由器安装时自动解析拉取，不在本 workflow 中打包分发。若路由器完全
# 离线且未配置本地软件源，需自行从官方源下载这些 kmod 放在同一目录一并
# 安装。
#
# 依赖：add_turboacc.sh 对内核版本做白名单判断（当前 6.6 / 6.12 / 6.18），
# ImmortalWrt 若切换到白名单外的内核版本，"Inject turboacc" 步骤会失败，
# 需等待上游脚本更新。
#
# 包命名：openwrt-25.12 起默认用 apk（包名-版本.apk，连字符），旧分支用
# ipk（包名_版本_架构.ipk，下划线）。下游查找逻辑需同时兼容两种命名，
# 且严禁把两种命名规则搞混——本 workflow 不再对产物文件名做任何"规范化"
# 重命名，原样保留 openwrt 编译产出的版本化文件名。
#
# 已知问题修复记录（2026-07-17，第一版）：
# mufeng05/turboacc 仓库 custom/luci-app-turboacc/Makefile 没有定义
# PKG_VERSION，而它 include 的 feeds/luci/luci.mk 依赖 git log 自动推导
# 版本号；但 add_turboacc.sh 是用 cp -rf 把文件硬拷贝进 package/turboacc/
# 目录，该目录不在 git 仓库里，导致版本推导失败、退化成 "0"。
#
# 已知问题修复记录（2026-07-17，第二版 —— 第一版遗留问题，事后证明诊断错误）：
# 第一版只修补了 package/turboacc/luci-app-turboacc/Makefile，
# luci-i18n-turboacc-zh-cn 的元数据版本仍是 0。第二版当时误判为
# "luci-i18n-turboacc-zh-cn 有自己独立的 Makefile，没被遍历到"，把 Fix
# 步骤改成遍历 package/turboacc/ 下所有 Makefile 逐个修补——这个诊断是
# 错的，实际遍历不会找到第二个文件，问题依旧存在，只是换了种方式没修好。
#
# 已知问题修复记录（2026-07-17，第三版 —— 真正的根因）：
# 查了 immortalwrt/luci 官方 luci.mk 源码才搞清楚：luci-i18n-turboacc-zh-cn
# 根本不是独立包目录，而是 luci-app-turboacc/Makefile 被 luci.mk 里的
# LuciTranslation 宏在同一个文件内循环展开出来的一个 Package/ 段，写在
# 同一个 Makefile 里。关键是这个宏用的版本变量跟主包不是同一个：
#   主包:  Package/$(PKG_NAME)                VERSION:=...PKG_VERSION...
#   i18n:  Package/luci-i18n-$(BASENAME)-$(1) VERSION:=$(PKG_PO_VERSION)
# PKG_VERSION 和 PKG_PO_VERSION 是两次独立的 findrev 调用（分别对整个
# 包目录、和单独对 po/ 子目录取 git log），互不继承。第一/二版补丁只写了
# PKG_VERSION，PKG_PO_VERSION 从未被设置，所以它继续走原来的 git log
# 推导逻辑——而 package/turboacc/ 目录不在 git 树里，findrev 拿不到该
# 路径的提交记录，退化成字面量 "0"。这跟 PKG_VERSION 当初退化成 0 是
# 同一个底层原因（目录不在 git 里），但因为是两个独立变量，修一个不会
# 带出另一个。
#
# 现在的修复方式：
#   1) "Fix turboacc PKG_VERSION" 改回只改 luci-app-turboacc 这一个
#      Makefile（本来就只有一个文件，不存在"遍历"的必要），但同时写入
#      PKG_VERSION 和 PKG_PO_VERSION 两个变量（外加 PKG_RELEASE），
#      两者都设成一致的值，这样主包和翻译子包的元数据版本才会同时正确。
#   2) 保留 "Verify package metadata versions" 步骤：直接解析已产出的
#      apk/ipk 包内 version 元数据字段（不是文件名，也不是 Makefile
#      里写了什么变量），只要有任一个是 0 或空立即失败。这一步不依赖
#      我们对根因的理解是否正确——哪怕以后 luci.mk 又换了别的变量名，
#      只要产物版本号是 0，这里都能拦下来，不会再靠猜。
#
# CONFIG_PACKAGE_TURBOACC_INCLUDE_* 符号前缀是字面量 TURBOACC（不是
# luci-app-turboacc），来自 package/turboacc/luci-app-turboacc/Makefile 的
# PKG_CONFIG_DEPENDS/LUCI_DEPENDS。该包没有独立 Config.in，子选项由
# LUCI_DEPENDS 的 "+FOO&&BAR:baz" 条件依赖语法生成，因此这三个符号直接
# 硬编码，不做运行时探测：
#   CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING
#   CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA
#   CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE

on:
  workflow_dispatch:
    inputs:
      repo_branch:
        description: '要编译的 ImmortalWrt 分支'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - openwrt-24.10
      build_scope:
        description: '编译范围 (按厂商分类, all = 全部代表机型)'
        required: true
        default: 'x86'
        type: choice
        options:
          - all
          - x86
          - arm
          - rockchip
          - mediatek
          - qualcomm
          - broadcom

permissions:
  contents: read

concurrency:
  group: build-immortalwrt-${{ github.event.inputs.repo_branch }}-${{ github.event.inputs.build_scope }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.repo_branch }}
  TURBOACC_SCRIPT: https://raw.githubusercontent.com/mufeng05/turboacc/main/add_turboacc.sh
  TURBOACC_REPO: https://github.com/mufeng05/turboacc

jobs:
  # 根据 build_scope 生成本次实际要跑的矩阵(JSON)
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          set -euxo pipefail

          cat > full_matrix.json <<'EOF'
          [
            {
              "name": "x86_64",
              "label": "x86_64 (PC/UEFI/VM)",
              "vendor": "x86",
              "target": "x86",
              "subtarget": "64",
              "device": "generic"
            },
            {
              "name": "armsr_armv8",
              "label": "ARM64 通用 (UEFI/VM/SBC)",
              "vendor": "arm",
              "target": "armsr",
              "subtarget": "armv8",
              "device": "generic"
            },
            {
              "name": "armsr_armv7",
              "label": "ARM32 通用 (UEFI/VM/SBC)",
              "vendor": "arm",
              "target": "armsr",
              "subtarget": "armv7",
              "device": "generic"
            },
            {
              "name": "rockchip_nanopi_r2s",
              "label": "FriendlyARM NanoPi R2S (RK3328, 代表 rockchip/armv8 全系)",
              "vendor": "rockchip",
              "target": "rockchip",
              "subtarget": "armv8",
              "device": "friendlyarm_nanopi-r2s"
            },
            {
              "name": "mediatek_filogic_redmi_ax6000",
              "label": "红米 AX6000 (联发科 MT7986/Filogic)",
              "vendor": "mediatek",
              "target": "mediatek",
              "subtarget": "filogic",
              "device": "xiaomi_redmi-router-ax6000"
            },
            {
              "name": "mediatek_mt7622_linksys_e8450",
              "label": "Linksys E8450 (联发科 MT7622)",
              "vendor": "mediatek",
              "target": "mediatek",
              "subtarget": "mt7622",
              "device": "linksys_e8450-ubi"
            },
            {
              "name": "ramips_mt7621_xiaomi_4a",
              "label": "小米路由器 4A 千兆版 (联发科 MT7621, target 历史上归在 ramips)",
              "vendor": "mediatek",
              "target": "ramips",
              "subtarget": "mt7621",
              "device": "xiaomi_mi-router-4a-gigabit"
            },
            {
              "name": "ipq806x_netgear_r7800",
              "label": "Netgear R7800 (高通 IPQ8065)",
              "vendor": "qualcomm",
              "target": "ipq806x",
              "subtarget": "generic",
              "device": "netgear_r7800"
            },
            {
              "name": "ipq40xx_linksys_ea8300",
              "label": "Linksys EA8300 (高通 IPQ4019)",
              "vendor": "qualcomm",
              "target": "ipq40xx",
              "subtarget": "generic",
              "device": "linksys_ea8300"
            },
            {
              "name": "qualcommax_ipq807x_dl_wrx36",
              "label": "Dynalink DL-WRX36 (高通 IPQ807x, WiFi6E)",
              "vendor": "qualcomm",
              "target": "qualcommax",
              "subtarget": "ipq807x",
              "device": "dynalink_dl-wrx36"
            },
            {
              "name": "bcm27xx_rpi4",
              "label": "树莓派 4 (博通 BCM2711)",
              "vendor": "broadcom",
              "target": "bcm27xx",
              "subtarget": "bcm2711",
              "device": "rpi-4"
            },
            {
              "name": "bcm4908_asus_gt_ac5300",
              "label": "ASUS GT-AC5300 (博通 BCM4908, 设备名待核实, 见 Verify device selection 步骤)",
              "vendor": "broadcom",
              "target": "bcm4908",
              "subtarget": "generic",
              "device": "asus_gt-ac5300"
            },
            {
              "name": "bcm53xx_netgear_r8000",
              "label": "Netgear R8000 (博通 BCM4709, 设备名待核实, 见 Verify device selection 步骤)",
              "vendor": "broadcom",
              "target": "bcm53xx",
              "subtarget": "generic",
              "device": "netgear_r8000"
            }
          ]
          EOF

          SCOPE="${{ github.event.inputs.build_scope }}"
          if [ "$SCOPE" = "all" ]; then
            MATRIX=$(jq -c '{include: .}' full_matrix.json)
          else
            MATRIX=$(jq -c --arg v "$SCOPE" '{include: [ .[] | select(.vendor == $v) ]}' full_matrix.json)
          fi

          COUNT=$(echo "$MATRIX" | jq '.include | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::build_scope='$SCOPE' 没有匹配到任何矩阵条目，请检查 full_matrix.json 里的 vendor 字段"
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "本次将编译 $COUNT 个平台："
          echo "$MATRIX" | jq -r '.include[] | "  - \(.label) [\(.target)/\(.subtarget)/\(.device)]"'

  # 矩阵内每个平台各跑一个独立 job，互不影响
  build:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      # all 模式下矩阵有 13 个条目，限流到 3 是速度与稳定性的折中
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Free disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip vim wget xxd zip zlib1g-dev zstd

      - name: Clone ImmortalWrt source
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt
          cd openwrt
          echo "Checked out branch: ${{ env.REPO_BRANCH }}"
          echo "Target: ${{ matrix.target }}/${{ matrix.subtarget }} device=${{ matrix.device }} (${{ matrix.label }})"

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-dl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-ccache

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject turboacc
        working-directory: openwrt
        run: |
          set -euxo pipefail
          curl -fsSL --retry 3 "${{ env.TURBOACC_SCRIPT }}" -o add_turboacc.sh
          bash add_turboacc.sh

      - name: Fix turboacc PKG_VERSION / PKG_PO_VERSION
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # 根因（已核对 immortalwrt/luci 官方 luci.mk 源码确认）：
          # luci-i18n-turboacc-zh-cn 不是独立包目录，是 luci-app-turboacc/
          # Makefile 被 luci.mk 里的 LuciTranslation 宏在同一个文件内循环
          # 展开出的一个 Package/ 段。主包和 i18n 子包用的是两个完全独立、
          # 互不继承的版本变量：
          #   Package/$(PKG_NAME)                 VERSION:=...PKG_VERSION...
          #   Package/luci-i18n-$(BASENAME)-$(1)  VERSION:=$(PKG_PO_VERSION)
          # 两者都由 findrev 宏各自单独跑一次 git log 推导（PKG_PO_VERSION
          # 专门对 po/ 子目录取 log，PKG_VERSION 对整个包目录取 log），
          # 只写 PKG_VERSION 完全不会影响 PKG_PO_VERSION。
          # 而 add_turboacc.sh 是用 cp -rf 把整个包目录硬拷贝进
          # package/turboacc/，不在 openwrt 的 git 树里，两个变量的
          # findrev 都拿不到 git log，各自独立退化成字面量 "0"。
          #
          # 所以只有一个 Makefile 需要改（不存在"遍历多个文件"的必要），
          # 但要同时显式写入 PKG_VERSION 和 PKG_PO_VERSION 两个变量，让
          # 主包和翻译子包的元数据版本都不再退化成 0。两者取同一个值，
          # 语义上等价于"这个包的这次构建版本"，跟官方 luci-app-* 包
          # 主/i18n 版本号经常一致的惯例也吻合。
          MAKEFILE="package/turboacc/luci-app-turboacc/Makefile"

          if [ ! -f "$MAKEFILE" ]; then
            echo "::error::$MAKEFILE 不存在，turboacc 注入结构已变化，需人工核实（包括确认 i18n 是否仍是同一文件内的宏展开，而不是独立目录）"
            exit 1
          fi

          if grep -q "^PKG_VERSION:=" "$MAKEFILE" && grep -q "^PKG_PO_VERSION:=" "$MAKEFILE"; then
            echo "PKG_VERSION 和 PKG_PO_VERSION 均已存在，跳过修补"
          else
            TMP_TURBOACC=$(mktemp -d)
            git clone --depth=50 --single-branch "${{ env.TURBOACC_REPO }}" "$TMP_TURBOACC"

            COMMIT_INFO=$(git -C "$TMP_TURBOACC" log -1 --format="%ct %h" --abbrev=7 -- custom/luci-app-turboacc lede/luci-app-turboacc)
            rm -rf "$TMP_TURBOACC"

            if [ -z "$COMMIT_INFO" ]; then
              echo "::error::无法从 turboacc 源仓库拿到 luci-app-turboacc 相关的 git log，请人工核实仓库路径是否变化"
              exit 1
            fi

            COMMIT_TS=$(echo "$COMMIT_INFO" | cut -d' ' -f1)
            COMMIT_HASH=$(echo "$COMMIT_INFO" | cut -d' ' -f2)
            SECS=$(( COMMIT_TS % 86400 ))
            YDAY=$(date --utc --date="@${COMMIT_TS}" "+%y.%j")
            BUILD_VERSION=$(printf '%s.%05d~%s' "$YDAY" "$SECS" "$COMMIT_HASH")

            # 插入位置必须在 Makefile 里 include luci.mk 之前（PKG_NAME 行
            # 紧随其后是 luci-app-* Makefile 的通行写法），因为 luci.mk 里
            # PKG_VERSION / PKG_PO_VERSION 都是 ?= 条件赋值，只有我们的
            # 显式赋值先执行，luci.mk 里的 findrev 才不会覆盖它。
            sed -i "/^PKG_NAME:=/a PKG_VERSION:=${BUILD_VERSION}\nPKG_PO_VERSION:=${BUILD_VERSION}\nPKG_RELEASE:=1" "$MAKEFILE"
            echo "已注入 PKG_VERSION:=${BUILD_VERSION} / PKG_PO_VERSION:=${BUILD_VERSION} / PKG_RELEASE:=1（主包与翻译子包同时生效，与 turboacc 源仓库真实 commit 绑定）"
          fi

          echo "=== 修补后的 Makefile 头部 ==="
          head -n 12 "$MAKEFILE"

      - name: Verify turboacc injection
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # add_turboacc.sh exit 0 不代表真的注入成功(内核版本超出其白名单时
          # 可能静默不做任何事)，这里直接校验源码树，避免几十分钟后才发现。
          FOUND=$(find package -maxdepth 3 -type d \( \
            -iname "*turboacc*" -o \
            -iname "*shortcut-fe*" -o \
            -iname "*fast-classifier*" -o \
            -iname "*fullconenat*" \
          \) 2>/dev/null || true)

          if [ -z "$FOUND" ]; then
            echo "::error::add_turboacc.sh 执行后未在 package/ 目录下找到相关目录，注入大概率未生效(常见原因：内核版本不在白名单 6.6/6.12/6.18 内，或上游脚本已变更)"
            exit 1
          fi

          echo "检测到以下 turboacc 相关源码目录已注入："
          echo "$FOUND"

          echo ""
          echo "=== luci-app-turboacc/Makefile 的 PKG_VERSION / PKG_PO_VERSION（应全部非 0/非空，二者都要检查——主包读 PKG_VERSION，i18n 子包读 PKG_PO_VERSION，是两个独立变量）==="
          MK="package/turboacc/luci-app-turboacc/Makefile"
          if [ ! -f "$MK" ]; then
            echo "::error::${MK} 不存在，Fix 步骤理应已在此之前失败退出，这里属于二次防线"
            exit 1
          fi
          VER=$(grep "^PKG_VERSION:=" "$MK" | head -n1 | cut -d'=' -f2 | tr -d ' \t')
          PO_VER=$(grep "^PKG_PO_VERSION:=" "$MK" | head -n1 | cut -d'=' -f2 | tr -d ' \t')
          echo "  PKG_VERSION=${VER:-<未设置>}  PKG_PO_VERSION=${PO_VER:-<未设置>}"
          if [ -z "$VER" ] || [ "$VER" = "0" ]; then
            echo "::error::PKG_VERSION 缺失或为 0，主包 luci-app-turboacc 的元数据版本会有问题"
            exit 1
          fi
          if [ -z "$PO_VER" ] || [ "$PO_VER" = "0" ]; then
            echo "::error::PKG_PO_VERSION 缺失或为 0，翻译子包 luci-i18n-turboacc-zh-cn 的元数据版本会有问题（这正是之前两次都漏掉的地方）"
            exit 1
          fi

      - name: Discover luci-app-turboacc Kconfig options
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # 打印这次真实注入的 Makefile 原文，供人工核对符号名是否随上游变化
          MAKEFILE=$(find package/turboacc -maxdepth 2 -iname "Makefile" -path "*luci-app-turboacc*" | head -n1 || true)

          echo "=== PKG_CONFIG_DEPENDS ==="
          if [ -n "$MAKEFILE" ]; then
            echo "文件路径: $MAKEFILE"
            grep -A 20 "PKG_CONFIG_DEPENDS" "$MAKEFILE" || echo "(未找到 PKG_CONFIG_DEPENDS 段)"
            echo "=== LUCI_DEPENDS ==="
            grep -A 10 "LUCI_DEPENDS" "$MAKEFILE" || echo "(未找到 LUCI_DEPENDS 段)"
          else
            echo "::error::未找到 luci-app-turboacc 的 Makefile，注入结构已变化，需人工核实 .config 中硬编码的符号是否仍适用"
            exit 1
          fi

      - name: Generate .config
        working-directory: openwrt
        run: |
          set -euxo pipefail
          # target/subtarget/device 原样小写使用(可能含连字符如 rpi-4/dl-wrx36)，
          # 不能转大写/转下划线，否则生成的符号不存在，make defconfig 会静默丢弃
          {
            echo "CONFIG_TARGET_${{ matrix.target }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc=m"
            echo "CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=m"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y"
            echo "CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y"
            echo "CONFIG_CCACHE=y"
          } > .config

          make defconfig

          echo "=== defconfig 展开后 .config 中所有 turboacc 相关行 ==="
          grep -i turboacc .config || echo "(未找到任何 turboacc 相关行)"

      - name: Verify device selection
        working-directory: openwrt
        run: |
          set -euxo pipefail
          if ! grep -q "^CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y" .config; then
            echo "::error::设备选择项未生效，请核实 target/subtarget/device 组合是否存在(可用 make menuconfig 搜索确认)"
            exit 1
          fi

          if ! grep -q "^CONFIG_PACKAGE_luci-app-turboacc=m" .config; then
            echo "::error::CONFIG_PACKAGE_luci-app-turboacc=m 未生效，请检查 Verify turboacc injection 输出及当前内核版本/分支下的 Kconfig 依赖"
            exit 1
          fi

          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y 未生效，请查看 Discover 步骤输出核实符号是否仍存在"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y 未生效，请查看 Discover 步骤输出核实符号是否仍存在"
            exit 1
          fi
          if ! grep -q "^CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y" .config; then
            echo "::error::CONFIG_PACKAGE_TURBOACC_INCLUDE_FULLCONE=y 未生效，请查看 Discover 步骤输出核实符号是否仍存在"
            exit 1
          fi

          echo "设备与 turboacc 配置校验通过。"
          grep -i turboacc .config

      - name: Download package sources
        working-directory: openwrt
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

          BAD_FILES="$(find dl -type f -size -1024c)"
          if [ -n "$BAD_FILES" ]; then
            echo "::error::以下下载文件异常过小，可能下载损坏："
            echo "$BAD_FILES"
            exit 1
          fi

      - name: Build firmware and packages
        working-directory: openwrt
        run: |
          set -euxo pipefail
          export CCACHE_DIR="$HOME/.ccache"
          make -j$(nproc) V=s || make -j1 V=s

      - name: Organize build output
        run: |
          set -euxo pipefail
          mkdir -p artifact/targets artifact/packages

          cp -a openwrt/bin/targets/*/* artifact/targets/ 2>/dev/null || true

          # 只收集 luci-app-turboacc / luci-i18n-turboacc-zh-cn 两个真正的
          # 第三方产物本身；其依赖的标准 kmod 由官方软件源提供，不打包分发。
          #
          # 重要：不对产物文件名做任何"规范化"重命名，原样保留 openwrt 编译
          # 产出的版本化文件名。apk 包命名规范是连字符（包名-版本-rN.apk），
          # ipk 是下划线（包名_版本-rN_架构.ipk），二者不可混用、不可互转。
          find openwrt/bin/packages openwrt/bin/targets -type f \( \
            -iname "luci-app-turboacc-*.apk" -o \
            -iname "luci-app-turboacc_*.ipk" -o \
            -iname "luci-i18n-turboacc-zh-cn-*.apk" -o \
            -iname "luci-i18n-turboacc-zh-cn_*.ipk" \
          \) -exec cp -f {} artifact/packages/ \;

          echo "=== artifact/packages 内容 ==="
          find artifact -type f | sort

      - name: Verify package metadata versions (not just filenames)
        run: |
          set -euxo pipefail
          # 之前的教训：只检查文件"是否存在"，没检查包内元数据 version
          # 字段是否为 0——文件名里带版本号不代表包内 apk/ipk 元数据版本号
          # 正确，两者是分开的信息源，apk index 校验用的是元数据。
          # 这里对 artifact/packages 下每一个包，真正解析其内部版本字段。
          FAIL=0
          for PKG in artifact/packages/*; do
            [ -e "$PKG" ] || continue
            case "$PKG" in
              *.apk)
                # apk 包是 tar 归档，info 段里的 .PKGINFO 含 version 字段
                VER=$(tar -xzOf "$PKG" .PKGINFO 2>/dev/null | grep "^version = " | cut -d' ' -f3 || true)
                ;;
              *.ipk)
                # ipk 是 ar 归档，control.tar.gz 里的 control 文件含 Version 字段
                TMPD=$(mktemp -d)
                ar x "$PKG" --output="$TMPD" control.tar.gz 2>/dev/null || true
                if [ -f "$TMPD/control.tar.gz" ]; then
                  VER=$(tar -xzOf "$TMPD/control.tar.gz" ./control 2>/dev/null | grep "^Version:" | awk '{print $2}' || true)
                fi
                rm -rf "$TMPD"
                ;;
              *)
                continue
                ;;
            esac

            if [ -z "$VER" ] || [ "$VER" = "0" ] || [[ "$VER" == 0-* ]]; then
              echo "::error::${PKG} 包内元数据版本号是 '${VER:-<空>}'，PKG_VERSION 修补没有对这个包生效"
              FAIL=1
            else
              echo "[OK] $(basename "$PKG") -> 元数据 version = ${VER}"
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::存在版本号异常的包，构建判定失败（宁可现在失败，也不要产出一个装不上的包）"
            exit 1
          fi

      - name: Verify turboacc packages exist
        run: |
          set -euxo pipefail
          # 按各自命名规范查找：apk 连字符、ipk 下划线，不混用通配符
          MAIN_PKG=$(find artifact/packages -maxdepth 1 -type f \( \
            -iname "luci-app-turboacc-*.apk" -o \
            -iname "luci-app-turboacc_*.ipk" \
          \) | head -n1 || true)

          I18N_PKG=$(find artifact/packages -maxdepth 1 -type f \( \
            -iname "luci-i18n-turboacc-zh-cn-*.apk" -o \
            -iname "luci-i18n-turboacc-zh-cn_*.ipk" \
          \) | head -n1 || true)

          if [ -z "$MAIN_PKG" ] || [ -z "$I18N_PKG" ]; then
            echo "::error::没找到主包(luci-app-turboacc)或中文包(luci-i18n-turboacc-zh-cn)，构建产物不完整"
            ls -lh artifact/packages/ || true
            exit 1
          fi

          echo "已找到主包: $MAIN_PKG"
          echo "已找到中文包: $I18N_PKG"
          echo ""
          echo "安装方式：把这两个文件传到路由器同一目录，路由器需能访问"
          echo "ImmortalWrt 官方软件源以自动解析 kmod-nft-offload/kmod-tcp-bbr/"
          echo "kmod-nft-fullcone 等依赖："
          echo "  apk 分支: apk add --allow-untrusted ./luci-app-turboacc-*.apk ./luci-i18n-turboacc-zh-cn-*.apk"
          echo "  opkg 分支: opkg install ./luci-app-turboacc_*.ipk ./luci-i18n-turboacc-zh-cn_*.ipk"

      - name: Package as zip
        run: |
          set -euxo pipefail
          ZIP_NAME="immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc.zip"
          (cd artifact && zip -r "../$ZIP_NAME" .)

          echo "zip 内容清单："
          unzip -l "$ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc
          path: immortalwrt-${{ env.REPO_BRANCH }}-${{ matrix.name }}-turboacc.zip
          retention-days: 7
          if-no-files-found: error
