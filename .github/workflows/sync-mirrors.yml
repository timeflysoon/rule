name: Sync Mirror Repositories

on:
  schedule:
    # 北京时间 07:20 (UTC 前日 23:20) 和 19:20 (UTC 11:20)
    - cron: '20 11,23 * * *'
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read

# ============================================================
# 🔧 配置区：修改源仓库和目标仓库
# ============================================================
env:
  SOURCE_REPO: "https://github.com/MetaCubeX/meta-rules-dat.git"
  SOURCE_REPO_NAME: "meta-rules-dat"

  TARGET_REPOS: >-
    git@github-timeflysoon:timeflysoon/meta-rules-dat.git
    git@github-88alt:88alt/meta-rules-dat.git

  SSH_HOSTS: >-
    github-timeflysoon:SSH_PRIVATE_KEY_TIMEFLYSOON
    github-88alt:SSH_PRIVATE_KEY_88ALT
# ============================================================

jobs:
  sync-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. 显示运行信息
        run: |
          echo "=== 镜像同步任务启动 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行ID: ${{ github.run_id }}"
          echo "UTC时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "北京时间: $(date -u '+%Y-%m-%d %H:%M:%S' -d '+8 hours')"
          echo "源仓库: $SOURCE_REPO"
          echo "目标仓库:"
          for repo in $TARGET_REPOS; do echo "  - $repo"; done

      - name: 2. 设置SSH密钥对
        env:
          SSH_PRIVATE_KEY_TIMEFLYSOON: ${{ secrets.SSH_PRIVATE_KEY_TIMEFLYSOON }}
          SSH_PRIVATE_KEY_88ALT: ${{ secrets.SSH_PRIVATE_KEY_88ALT }}
        run: |
          echo "配置SSH环境..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          for entry in $SSH_HOSTS; do
            ALIAS="${entry%%:*}"
            SECRET_NAME="${entry##*:}"
            KEY_FILE="$HOME/.ssh/id_ed25519_${ALIAS}"

            KEY_VALUE="${!SECRET_NAME}"
            if [ -z "$KEY_VALUE" ]; then
              echo "❌ Secret '$SECRET_NAME' 未配置或为空"
              exit 1
            fi

            echo "$KEY_VALUE" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"

            cat >> ~/.ssh/config << EOF
          Host ${ALIAS}
            HostName github.com
            User git
            IdentityFile ${KEY_FILE}
            IdentitiesOnly yes
            StrictHostKeyChecking no

          EOF
            echo "✅ 已配置: $ALIAS -> $KEY_FILE"
          done

          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "✅ SSH配置完成"

      - name: 3. 验证SSH连接
        run: |
          echo "验证SSH密钥连接..."
          EXIT_CODE=0

          for entry in $SSH_HOSTS; do
            ALIAS="${entry%%:*}"
            echo "测试连接: $ALIAS ..."
            if (ssh -T git@${ALIAS} 2>&1 || true) | grep -qi "successfully authenticated"; then
              echo "✅ $ALIAS 连接成功"
            else
              echo "❌ $ALIAS 连接失败"
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ 所有SSH连接验证通过"
          else
            echo "❌ SSH连接验证失败"
            exit 1
          fi

      - name: 4. 配置Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git config --global init.defaultBranch main
          echo "✅ Git配置完成"

      - name: 5. 克隆源仓库
        run: |
          echo "正在克隆源仓库: $SOURCE_REPO"
          CLONE_START=$(date +%s)
          REPO_DIR="${SOURCE_REPO_NAME}.git"

          MAX_RETRY=3
          for i in $(seq 1 $MAX_RETRY); do
            echo "克隆尝试 $i/$MAX_RETRY..."
            rm -rf "$REPO_DIR" 2>/dev/null || true

            if git clone --mirror "$SOURCE_REPO" "$REPO_DIR"; then
              echo "✅ 克隆成功，耗时: $(($(date +%s) - CLONE_START))秒"
              break
            elif [ $i -eq $MAX_RETRY ]; then
              echo "❌ 克隆失败（已达最大重试次数）"
              exit 1
            else
              echo "克隆失败，10秒后重试..."
              sleep 10
            fi
          done

          cd "$REPO_DIR"
          git config --unset-all remote.origin.fetch 2>/dev/null || true
          git config --add remote.origin.fetch '+refs/heads/*:refs/heads/*'
          git config --add remote.origin.fetch '+refs/tags/*:refs/tags/*'

          git for-each-ref --format='delete %(refname)' refs/pull 2>/dev/null | git update-ref --stdin 2>/dev/null || echo "无本地PR引用可清理"

          echo "仓库信息:"
          echo "  分支: $(git branch -r | wc -l)"
          echo "  标签: $(git tag | wc -l)"
          echo "  大小: $(du -sh . | cut -f1)"

      - name: 6. 执行镜像同步
        id: sync_step
        run: |
          cd "${SOURCE_REPO_NAME}.git"
          echo "=== 开始同步镜像仓库 $(date '+%Y-%m-%d %H:%M:%S') UTC ==="

          SYNC_START_TIME=$(date +%s)
          FAIL_COUNT=0

          for TARGET_REPO in $TARGET_REPOS; do
            echo "=== 推送镜像到: $TARGET_REPO ==="
            REPO_START_TIME=$(date +%s)
            PUSH_SUCCESS=false

            MAX_RETRY=2
            for i in $(seq 1 $MAX_RETRY); do
              echo "推送尝试 $i/$MAX_RETRY..."
              if timeout 300 git push --mirror "$TARGET_REPO"; then
                echo "✅ 推送成功，耗时: $(($(date +%s) - REPO_START_TIME))秒"
                PUSH_SUCCESS=true
                break
              elif [ $i -eq $MAX_RETRY ]; then
                echo "❌ 推送失败（已达最大重试次数）"
              else
                echo "推送失败，10秒后重试..."
                sleep 10
              fi
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "⚠️ 标记此仓库同步失败"
            fi
          done

          echo "=== 同步完成，总耗时: $(($(date +%s) - SYNC_START_TIME))秒 ==="

          if [ $FAIL_COUNT -gt 0 ]; then
            echo "❌ 有 ${FAIL_COUNT} 个仓库同步失败"
            exit 1
          else
            echo "✅ 所有仓库同步成功"
          fi

      - name: 7. 清理敏感数据
        if: always()
        run: |
          echo "清理SSH密钥文件..."
          for entry in $SSH_HOSTS; do
            ALIAS="${entry%%:*}"
            rm -f "$HOME/.ssh/id_ed25519_${ALIAS}"
          done
          rm -f ~/.ssh/config ~/.ssh/known_hosts
          echo "✅ 敏感数据清理完成"

      - name: 8. 生成运行报告
        if: always()
        run: |
          echo "## 🚀 镜像同步任务报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**运行信息**:" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行状态: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 源仓库: $SOURCE_REPO" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**同步目标**:" >> $GITHUB_STEP_SUMMARY
          for repo in $TARGET_REPOS; do
            echo "- $repo" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.sync_step.outcome }}" == "success" ]]; then
            echo "✅ **执行结果**: 同步成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **执行结果**: 同步失败，请查看日志排查问题" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "报告生成时间: $(date '+%Y-%m-%d %H:%M:%S') UTC" >> $GITHUB_STEP_SUMMARY
